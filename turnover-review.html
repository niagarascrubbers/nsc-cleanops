<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnover Review | NSC CleanOps</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #071f35;
      --navy-light: #0b2f4f;
      --blue: #2f8fca;
      --blue-light: #eaf6fc;
      --background: #f5f8fb;
      --border: #dfe8ef;
      --text: #17324d;
      --muted: #6c7e8f;
      --success: #1f8f64;
      --success-light: #e9f8f1;
      --warning: #aa7214;
      --warning-light: #fff8e7;
      --danger: #c94747;
      --danger-light: #fff0f0;
      --shadow: 0 12px 32px rgba(18, 50, 77, 0.09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: "Poppins", sans-serif;
    }

    button, textarea { font: inherit; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--navy);
      color: white;
      box-shadow: 0 8px 24px rgba(7, 31, 53, 0.16);
    }

    .header-inner {
      width: min(1180px, calc(100% - 32px));
      min-height: 72px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 11px;
      background: var(--blue);
      font-family: "Montserrat", sans-serif;
      font-size: 12px;
      font-weight: 700;
    }

    .brand-title {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: 15px;
      font-weight: 700;
    }

    .brand-subtitle {
      margin-top: 2px;
      color: #a8c0d1;
      font-size: 10px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .header-button {
      min-height: 38px;
      padding: 8px 13px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 9px;
      background: rgba(255,255,255,.07);
      color: white;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .overview,
    .review-card,
    .task-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .overview {
      padding: 20px;
      margin-bottom: 18px;
    }

    .overview-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .property-name {
      margin: 0;
      color: var(--navy-light);
      font-family: "Montserrat", sans-serif;
      font-size: 24px;
    }

    .property-location {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--warning-light);
      color: var(--warning);
      font-size: 9px;
      font-weight: 600;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .overview-item {
      padding: 12px;
      border: 1px solid #edf2f6;
      border-radius: 10px;
      background: #f8fafc;
    }

    .overview-label {
      color: var(--muted);
      font-size: 8px;
      font-weight: 600;
      letter-spacing: .4px;
      text-transform: uppercase;
    }

    .overview-value {
      margin-top: 5px;
      color: var(--navy-light);
      font-size: 10px;
      font-weight: 600;
      line-height: 1.5;
    }

    .task-list {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }

    .task-title {
      margin: 0;
      color: var(--navy-light);
      font-family: "Montserrat", sans-serif;
      font-size: 15px;
    }

    .task-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 9px;
    }

    .task-body {
      padding: 16px 18px;
    }

    .task-row {
      display: grid;
      grid-template-columns: minmax(0,1fr) 190px;
      gap: 18px;
    }

    .task-text {
      color: var(--navy-light);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.5;
    }

    .task-note {
      margin-top: 8px;
      padding: 10px 11px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.5;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }

    .badge {
      padding: 3px 7px;
      border-radius: 999px;
      background: #f1f5f8;
      color: #536b7e;
      font-size: 8px;
      font-weight: 600;
    }

    .badge.complete {
      background: var(--success-light);
      color: var(--success);
    }

    .badge.warning {
      background: var(--warning-light);
      color: var(--warning);
    }

    .photos {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
    }

    .photo {
      aspect-ratio: 1;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f8fafc;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .no-photo {
      display: grid;
      place-items: center;
      min-height: 90px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: 9px;
      text-align: center;
      padding: 10px;
    }

    .review-card {
      padding: 20px;
    }

    .review-title {
      margin: 0;
      color: var(--navy-light);
      font-family: "Montserrat", sans-serif;
      font-size: 18px;
    }

    .review-description {
      margin: 6px 0 14px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.6;
    }

    .review-card textarea {
      width: 100%;
      min-height: 110px;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      resize: vertical;
      color: var(--text);
      font-size: 10px;
      outline: none;
    }

    .review-card textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47,143,202,.12);
    }

    .review-actions {
      display: flex;
      justify-content: flex-end;
      gap: 9px;
      margin-top: 14px;
    }

    .button {
      min-height: 40px;
      padding: 9px 15px;
      border: 1px solid transparent;
      border-radius: 9px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: .6;
    }

    .button-primary {
      color: white;
      background: var(--navy-light);
    }

    .button-danger {
      color: var(--danger);
      background: white;
      border-color: #efcaca;
    }

    .loading,
    .error {
      padding: 70px 20px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .spinner {
      width: 34px;
      height: 34px;
      margin: 0 auto 14px;
      border: 3px solid #dcecf4;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .state-title {
      margin: 0 0 7px;
      color: var(--navy-light);
      font-family: "Montserrat", sans-serif;
      font-size: 16px;
    }

    .state-text {
      max-width: 520px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 60;
      width: min(360px, calc(100vw - 36px));
      padding: 13px 15px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--success);
      border-radius: 10px;
      background: white;
      box-shadow: 0 20px 50px rgba(7,31,53,.2);
      color: var(--text);
      font-size: 10px;
      line-height: 1.5;
    }

    .toast.error { border-left-color: var(--danger); }

    @media (max-width: 800px) {
      .overview-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .task-row { grid-template-columns: 1fr; }
      .photos { grid-template-columns: repeat(3, minmax(0,1fr)); }
    }

    @media (max-width: 520px) {
      .header-inner,
      .page {
        width: min(100% - 22px, 1180px);
      }

      .overview-header {
        flex-direction: column;
      }

      .overview-grid,
      .photos {
        grid-template-columns: 1fr;
      }

      .review-actions {
        flex-direction: column-reverse;
      }

      .review-actions .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">NSC</div>
        <div>
          <p class="brand-title">NSC CleanOps</p>
          <div class="brand-subtitle">Manager Turnover Review</div>
        </div>
      </div>

      <div class="header-actions">
        <button class="header-button" id="backButton" type="button">Turnovers</button>
        <button class="header-button" id="logoutButton" type="button">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="page" id="pageContent">
    <div class="loading">
      <div class="spinner"></div>
      <h1 class="state-title">Loading turnover review</h1>
      <p class="state-text">Retrieving completed tasks and submitted photos.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>

  <script>
    "use strict";

    const db = window.nscSupabase || window.supabaseClient;
    const pageContent = document.getElementById("pageContent");

    let currentProfile = null;
    let turnover = null;
    let tasks = [];
    let photos = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getTurnoverId() {
      return new URLSearchParams(window.location.search).get("id");
    }

    function showToast(message, type = "success") {
      document.querySelector(".toast")?.remove();

      const toast = document.createElement("div");
      toast.className = `toast ${type === "error" ? "error" : ""}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      window.setTimeout(() => toast.remove(), 4300);
    }

    function formatDate(value) {
      if (!value) return "Not scheduled";

      return new Intl.DateTimeFormat("en-CA", {
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric"
      }).format(new Date(`${value}T12:00:00`));
    }

    function formatTime(value) {
      if (!value) return "Not entered";

      return new Intl.DateTimeFormat("en-CA", {
        hour: "numeric",
        minute: "2-digit"
      }).format(new Date(value));
    }

    async function signedPhotoUrl(path) {
      const { data, error } = await db.storage
        .from("turnover-photos")
        .createSignedUrl(path, 3600);

      if (error) return null;
      return data?.signedUrl || null;
    }

    async function requireManagerSession() {
      if (!db) throw new Error("Supabase client is unavailable.");

      const {
        data: { session },
        error: sessionError
      } = await db.auth.getSession();

      if (sessionError) throw sessionError;

      if (!session) {
        window.location.href = "login.html";
        return false;
      }

      const { data: profile, error: profileError } = await db
        .from("users")
        .select("id, full_name, role, active")
        .eq("auth_user_id", session.user.id)
        .single();

      if (profileError) throw profileError;
      if (!profile?.active) throw new Error("This user account is inactive.");
      if (!["admin", "manager"].includes(profile.role)) {
        throw new Error("Manager access is required.");
      }

      currentProfile = profile;
      return true;
    }

    async function loadData() {
      const turnoverId = getTurnoverId();
      if (!turnoverId) throw new Error("No turnover was selected.");

      const { data: turnoverData, error: turnoverError } = await db
        .from("turnovers")
        .select(`
          id,
          turnover_date,
          scheduled_start,
          scheduled_end,
          guest_checkin_time,
          status,
          review_notes,
          properties (
            property_name,
            address,
            city,
            province
          ),
          users:assigned_user_id (
            full_name
          )
        `)
        .eq("id", turnoverId)
        .single();

      if (turnoverError) throw turnoverError;
      turnover = turnoverData;

      const { data: taskData, error: taskError } = await db
        .from("turnover_tasks")
        .select(`
          id,
          room_id,
          section_name,
          task_text,
          task_status,
          cleaner_note,
          is_required,
          required_photo_count,
          manager_status,
          rooms (
            room_name
          )
        `)
        .eq("turnover_id", turnoverId)
        .order("sort_order", { ascending: true });

      if (taskError) throw taskError;
      tasks = Array.isArray(taskData) ? taskData : [];

      const { data: photoData, error: photoError } = await db
        .from("photos")
        .select("id, turnover_task_id, storage_path, caption, created_at")
        .eq("turnover_id", turnoverId)
        .order("created_at", { ascending: true });

      if (photoError) throw photoError;

      photos = await Promise.all((photoData || []).map(async photo => ({
        ...photo,
        signed_url: await signedPhotoUrl(photo.storage_path)
      })));
    }

    function renderPage() {
      const location = [
        turnover.properties?.address,
        turnover.properties?.city,
        turnover.properties?.province
      ].filter(Boolean).join(", ");

      pageContent.innerHTML = `
        <section class="overview">
          <div class="overview-header">
            <div>
              <h1 class="property-name">${escapeHtml(turnover.properties?.property_name || "Turnover Review")}</h1>
              <div class="property-location">${escapeHtml(location || "Address not entered")}</div>
            </div>

            <span class="status-badge">${escapeHtml((turnover.status || "").replaceAll("_", " "))}</span>
          </div>

          <div class="overview-grid">
            <div class="overview-item">
              <div class="overview-label">Turnover Date</div>
              <div class="overview-value">${escapeHtml(formatDate(turnover.turnover_date))}</div>
            </div>

            <div class="overview-item">
              <div class="overview-label">Scheduled Start</div>
              <div class="overview-value">${escapeHtml(formatTime(turnover.scheduled_start))}</div>
            </div>

            <div class="overview-item">
              <div class="overview-label">Scheduled End</div>
              <div class="overview-value">${escapeHtml(formatTime(turnover.scheduled_end))}</div>
            </div>

            <div class="overview-item">
              <div class="overview-label">Assigned Cleaner</div>
              <div class="overview-value">${escapeHtml(turnover.users?.full_name || "Unassigned")}</div>
            </div>
          </div>
        </section>

        <section class="task-list">
          ${tasks.map((task, index) => {
            const taskPhotos = photos.filter(photo => photo.turnover_task_id === task.id);

            return `
              <article class="task-card">
                <div class="task-header">
                  <div>
                    <h2 class="task-title">${index + 1}. ${escapeHtml(task.task_text)}</h2>
                    <div class="task-meta">${escapeHtml(task.rooms?.room_name || task.section_name || "General Task")}</div>
                  </div>
                </div>

                <div class="task-body">
                  <div class="task-row">
                    <div>
                      <div class="task-text">Cleaner submission</div>

                      <div class="badges">
                        <span class="badge ${task.task_status === "completed" ? "complete" : "warning"}">
                          ${escapeHtml((task.task_status || "pending").replaceAll("_", " "))}
                        </span>
                        ${task.is_required ? `<span class="badge warning">Mandatory Task</span>` : ""}
                        ${Number(task.required_photo_count) > 0
                          ? `<span class="badge warning">${taskPhotos.length} of ${task.required_photo_count} required photos</span>`
                          : ""}
                      </div>

                      <div class="task-note">
                        ${task.cleaner_note
                          ? escapeHtml(task.cleaner_note)
                          : "No cleaner note was submitted for this task."
                        }
                      </div>
                    </div>

                    <div class="photos">
                      ${taskPhotos.length
                        ? taskPhotos.map(photo => photo.signed_url
                            ? `<a class="photo" href="${escapeHtml(photo.signed_url)}" target="_blank" rel="noopener noreferrer"><img src="${escapeHtml(photo.signed_url)}" alt="Turnover task photo"></a>`
                            : `<div class="no-photo">Photo preview unavailable</div>`
                          ).join("")
                        : `<div class="no-photo">No photos submitted</div>`
                      }
                    </div>
                  </div>
                </div>
              </article>
            `;
          }).join("")}
        </section>

        <section class="review-card">
          <h2 class="review-title">Manager Review</h2>
          <p class="review-description">
            Approve the turnover when all work meets the required standard. When corrections are needed, enter clear instructions before returning it to the cleaner.
          </p>

          <textarea id="reviewNotes" placeholder="Enter manager review notes or correction instructions.">${escapeHtml(turnover.review_notes || "")}</textarea>

          <div class="review-actions">
            <button class="button button-danger" id="rejectButton" type="button">Request Corrections</button>
            <button class="button button-primary" id="approveButton" type="button">Approve Turnover</button>
          </div>
        </section>
      `;

      document.getElementById("approveButton").addEventListener("click", approveTurnover);
      document.getElementById("rejectButton").addEventListener("click", rejectTurnover);
    }

    async function approveTurnover() {
      const button = document.getElementById("approveButton");
      const notes = document.getElementById("reviewNotes").value.trim();

      button.disabled = true;
      button.textContent = "Approving";

      try {
        const now = new Date().toISOString();

        const { error: taskError } = await db
          .from("turnover_tasks")
          .update({
            manager_status: "approved",
            reviewed_by: currentProfile.id,
            reviewed_at: now
          })
          .eq("turnover_id", turnover.id);

        if (taskError) throw taskError;

        const { error } = await db
          .from("turnovers")
          .update({
            status: "completed",
            property_readiness_status: "approved",
            owner_approval_status: "approved",
            review_notes: notes || null,
            reviewed_by: currentProfile.id,
            reviewed_at: now
          })
          .eq("id", turnover.id);

        if (error) throw error;

        showToast("The turnover has been approved.");
        window.setTimeout(() => {
          window.location.href = "turnovers.html";
        }, 900);
      } catch (error) {
        button.disabled = false;
        button.textContent = "Approve Turnover";
        showToast(error.message || "The turnover could not be approved.", "error");
      }
    }

    async function rejectTurnover() {
      const notes = document.getElementById("reviewNotes").value.trim();

      if (!notes) {
        showToast("Enter correction instructions before returning the turnover.", "error");
        return;
      }

      const button = document.getElementById("rejectButton");
      button.disabled = true;
      button.textContent = "Returning Turnover";

      try {
        const now = new Date().toISOString();

        const { error: taskError } = await db
          .from("turnover_tasks")
          .update({
            manager_status: "rejected",
            manager_note: notes,
            reviewed_by: currentProfile.id,
            reviewed_at: now
          })
          .eq("turnover_id", turnover.id);

        if (taskError) throw taskError;

        const { error } = await db
          .from("turnovers")
          .update({
            status: "correction_required",
            property_readiness_status: "correction_required",
            owner_approval_status: "rejected",
            review_notes: notes,
            reviewed_by: currentProfile.id,
            reviewed_at: now
          })
          .eq("id", turnover.id);

        if (error) throw error;

        showToast("The turnover has been returned for corrections.");
        window.setTimeout(() => {
          window.location.href = "turnovers.html";
        }, 900);
      } catch (error) {
        button.disabled = false;
        button.textContent = "Request Corrections";
        showToast(error.message || "The turnover could not be returned.", "error");
      }
    }

    document.getElementById("backButton").addEventListener("click", () => {
      window.location.href = "turnovers.html";
    });

    document.getElementById("logoutButton").addEventListener("click", async () => {
      try {
        await db.auth.signOut();
      } finally {
        window.location.href = "login.html";
      }
    });

    async function initialize() {
      try {
        const authenticated = await requireManagerSession();
        if (!authenticated) return;

        await loadData();
        renderPage();
      } catch (error) {
        console.error("Turnover review failed:", error);

        pageContent.innerHTML = `
          <div class="error">
            <h1 class="state-title">Unable to load turnover review</h1>
            <p class="state-text">${escapeHtml(error.message || "An unexpected error occurred.")}</p>
          </div>
        `;
      }
    }

    initialize();
  </script>
</body>
</html>
