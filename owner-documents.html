<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnovers & Documents | NSC CleanOps</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy-950: #071a2b;
      --navy-900: #0b2239;
      --navy-800: #123a5a;
      --navy-700: #1c4f73;
      --water-600: #188cac;
      --water-500: #2aa7c9;
      --water-100: #e8f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fbfd;
      --background: #f3f7fa;
      --border: #dce7ef;
      --border-strong: #c9d8e3;
      --text-primary: #18324a;
      --text-secondary: #6b7f90;
      --success: #2f8f68;
      --success-soft: #e8f6ef;
      --warning: #c88921;
      --warning-soft: #fff6e4;
      --danger: #c65555;
      --danger-soft: #fdeeee;
      --info: #387da8;
      --info-soft: #eaf4fb;
      --shadow: 0 10px 28px rgba(11, 34, 57, 0.07);
      --radius-xl: 16px;
      --radius-lg: 12px;
      --radius-md: 10px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--text-primary);
      font-family: "Poppins", sans-serif;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .app-shell {
      display: grid;
      grid-template-columns: 218px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: 218px;
      height: 100vh;
      padding: 22px 16px;
      display: flex;
      flex-direction: column;
      color: #fff;
      background: linear-gradient(180deg, var(--navy-950), var(--navy-800));
      z-index: 40;
    }

    .brand {
      padding: 2px 10px 20px;
      margin-bottom: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .brand h1 {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: 20px;
      letter-spacing: -0.35px;
    }

    .brand p {
      margin: 5px 0 0;
      color: rgba(255,255,255,0.62);
      font-size: 11px;
    }

    .nav-label {
      margin: 0 10px 8px;
      color: rgba(255,255,255,0.44);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.1px;
      text-transform: uppercase;
    }

    .nav {
      display: grid;
      gap: 6px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 10px 12px;
      color: rgba(255,255,255,0.74);
      text-decoration: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      transition: 0.18s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      color: #fff;
      background: rgba(42, 167, 201, 0.17);
    }

    .nav-icon {
      display: inline-grid;
      width: 20px;
      height: 20px;
      place-items: center;
      font-size: 15px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .user-card {
      padding: 0 8px 14px;
    }

    .user-name {
      margin: 0;
      font-weight: 600;
      font-size: 13px;
    }

    .user-role {
      margin: 3px 0 0;
      color: rgba(255,255,255,0.54);
      font-size: 11px;
    }

    .signout-button {
      width: 100%;
      min-height: 40px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-weight: 600;
      font-size: 13px;
    }

    .signout-button:hover { background: rgba(255,255,255,0.12); }

    .main-area {
      grid-column: 2;
      min-width: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      min-height: 72px;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: rgba(255,255,255,0.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .topbar-title {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: 20px;
      letter-spacing: -0.35px;
    }

    .topbar-subtitle {
      margin: 3px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: min(520px, 55vw);
    }

    .property-select {
      min-width: 245px;
      max-width: 360px;
      height: 42px;
      padding: 0 38px 0 12px;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      background: #fff;
      color: var(--text-primary);
      outline: none;
    }

    .property-select:focus,
    .search-input:focus {
      border-color: var(--water-500);
      box-shadow: 0 0 0 3px rgba(42,167,201,0.12);
    }

    .button {
      min-height: 40px;
      padding: 0 14px;
      border: 0;
      border-radius: 10px;
      font-weight: 600;
      font-size: 12px;
      transition: 0.18s ease;
    }

    .button-primary {
      color: #fff;
      background: var(--navy-800);
    }

    .button-primary:hover { background: var(--navy-700); }

    .button-secondary {
      color: var(--navy-800);
      background: var(--water-100);
    }

    .button-secondary:hover { background: #d9f1f8; }

    .button-ghost {
      color: var(--navy-700);
      background: transparent;
      border: 1px solid var(--border);
    }

    .button-ghost:hover { background: var(--surface-soft); }

    .button-small {
      min-height: 33px;
      padding: 0 10px;
      border-radius: 8px;
      font-size: 11px;
    }

    .mobile-menu-button {
      display: none;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--navy-900);
      font-size: 18px;
    }

    .content {
      padding: 20px 22px 28px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .search-input {
      width: 100%;
      height: 42px;
      padding: 0 13px;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      background: #fff;
      color: var(--text-primary);
      outline: none;
    }

    .tabs {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .tab-button {
      min-height: 38px;
      padding: 0 13px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fff;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .tab-button:hover,
    .tab-button.active {
      color: #fff;
      background: var(--navy-800);
      border-color: var(--navy-800);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .card-header {
      min-height: 58px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: 16px;
      letter-spacing: -0.2px;
    }

    .card-subtitle {
      margin: 3px 0 0;
      color: var(--text-secondary);
      font-size: 11px;
    }

    .card-body {
      padding: 0;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 10px 12px;
      background: var(--surface-soft);
      color: var(--text-secondary);
      text-align: left;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.45px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 11px 12px;
      font-size: 11px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: 0; }

    tbody tr:hover { background: #fbfdfe; }

    .primary-cell {
      font-weight: 600;
      color: var(--text-primary);
    }

    .secondary-cell {
      color: var(--text-secondary);
      font-size: 10.5px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 9.5px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-completed,
    .status-paid,
    .status-approved { color: var(--success); background: var(--success-soft); }

    .status-scheduled,
    .status-issued,
    .status-active { color: var(--info); background: var(--info-soft); }

    .status-in_progress,
    .status-pending,
    .status-outstanding { color: var(--warning); background: var(--warning-soft); }

    .status-cancelled,
    .status-declined,
    .status-overdue { color: var(--danger); background: var(--danger-soft); }

    .status-other { color: #667a8a; background: #eef3f6; }

    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .empty-state,
    .loading-state,
    .error-state {
      min-height: 220px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 5px;
      padding: 24px;
      text-align: center;
      color: var(--text-secondary);
    }

    .empty-state strong,
    .error-state strong {
      color: var(--text-primary);
      font-size: 13px;
    }

    .empty-state span,
    .error-state span {
      font-size: 11px;
      line-height: 1.5;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #dcebf1;
      border-top-color: var(--water-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 12px;
      padding: 14px;
    }

    .photo-card {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: #fff;
    }

    .photo-preview {
      aspect-ratio: 4 / 3;
      background: var(--surface-soft);
      overflow: hidden;
    }

    .photo-preview img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .photo-info {
      padding: 9px 10px 10px;
    }

    .photo-title {
      margin: 0;
      font-size: 11px;
      font-weight: 600;
    }

    .photo-meta {
      margin: 4px 0 0;
      color: var(--text-secondary);
      font-size: 9.5px;
      line-height: 1.45;
    }

    .document-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
      padding: 14px;
    }

    .document-card {
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: #fff;
    }

    .document-card-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
    }

    .document-title {
      margin: 0;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
    }

    .document-meta {
      margin: 5px 0 0;
      color: var(--text-secondary);
      font-size: 10px;
      line-height: 1.5;
    }

    .document-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(5, 20, 33, 0.58);
    }

    .modal-backdrop.open { display: grid; }

    .modal {
      width: min(860px, 100%);
      max-height: 88vh;
      overflow: auto;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(5,20,33,0.25);
    }

    .modal-header {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: 17px;
    }

    .modal-body { padding: 16px; }

    .icon-button {
      width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fff;
      color: var(--navy-800);
      font-size: 19px;
      line-height: 1;
    }

    .checklist-room {
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .checklist-room-header {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface-soft);
      font-size: 12px;
      font-weight: 600;
    }

    .checklist-task {
      padding: 9px 12px;
      display: grid;
      grid-template-columns: 18px minmax(0,1fr) auto;
      gap: 8px;
      align-items: start;
      border-top: 1px solid var(--border);
      font-size: 11px;
    }

    .task-check {
      width: 15px;
      height: 15px;
      margin-top: 1px;
      border-radius: 4px;
      border: 1px solid var(--border-strong);
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--success);
      border-color: var(--success);
      font-size: 10px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 200;
      max-width: 360px;
      padding: 12px 14px;
      border-radius: 10px;
      color: #fff;
      background: var(--navy-900);
      box-shadow: 0 12px 32px rgba(5,20,33,0.24);
      font-size: 12px;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: 0.2s ease;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: var(--danger); }

    @media (max-width: 920px) {
      .app-shell { grid-template-columns: 1fr; }

      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.22s ease;
      }

      .sidebar.open { transform: translateX(0); }

      .main-area { grid-column: 1; }

      .mobile-menu-button {
        display: inline-grid;
        place-items: center;
      }

      .topbar {
        padding: 12px 16px;
      }

      .topbar-actions { min-width: 0; }
      .property-select { min-width: 190px; }
      .content { padding: 16px; }
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .topbar-actions {
        width: 100%;
        justify-content: stretch;
      }

      .property-select {
        flex: 1;
        min-width: 0;
        max-width: none;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .tabs {
        width: 100%;
      }

      .photo-grid,
      .document-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1>NSC CleanOps</h1>
        <p>Owner Portal</p>
      </div>

      <p class="nav-label">Workspace</p>
      <nav class="nav">
        <a class="nav-link" href="owner-dashboard.html">
          <span class="nav-icon">⌂</span>
          <span>Dashboard</span>
        </a>

        <a class="nav-link active" href="owner-documents.html">
          <span class="nav-icon">▤</span>
          <span>Turnovers &amp; Documents</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-card">
          <p class="user-name" id="sidebarUserName"></p>
          <p class="user-role">Property Owner</p>
        </div>
        <button class="signout-button" id="signOutButton" type="button">Sign Out</button>
      </div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <div class="topbar-left">
          <button class="mobile-menu-button" id="mobileMenuButton" type="button" aria-label="Open navigation">☰</button>
          <div>
            <h1 class="topbar-title">Turnovers &amp; Documents</h1>
            <p class="topbar-subtitle" id="selectedPropertyAddress"></p>
          </div>
        </div>

        <div class="topbar-actions">
          <select class="property-select" id="propertySelect" aria-label="Select property"></select>
        </div>
      </header>

      <main class="content">
        <div class="toolbar">
          <input class="search-input" id="searchInput" type="search" aria-label="Search records">
          <div class="tabs" id="tabs">
            <button class="tab-button active" type="button" data-tab="turnovers">Previous Turnovers</button>
            <button class="tab-button" type="button" data-tab="checklists">Completed Checklists</button>
            <button class="tab-button" type="button" data-tab="photos">Photos</button>
            <button class="tab-button" type="button" data-tab="reports">Reports</button>
            <button class="tab-button" type="button" data-tab="documents">Documents</button>
            <button class="tab-button" type="button" data-tab="agreements">Agreements</button>
            <button class="tab-button" type="button" data-tab="invoices">Invoices</button>
          </div>
        </div>

        <section class="card">
          <div class="card-header">
            <div>
              <h2 class="card-title" id="sectionTitle">Previous Turnovers</h2>
              <p class="card-subtitle" id="sectionSubtitle">Completed and historical cleaning visits</p>
            </div>
          </div>

          <div class="card-body" id="sectionContent">
            <div class="loading-state"><div class="spinner"></div></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="modal-backdrop" id="checklistModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="checklistModalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="checklistModalTitle">Completed Checklist</h2>
        <button class="icon-button" type="button" data-close-modal="checklistModal">×</button>
      </div>
      <div class="modal-body" id="checklistModalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="owner-data.js"></script>
</body>
</html>
