<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnovers & Documents | NSC CleanOps</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:#0b2f4f;
      --blue:#2d8ec7;
      --blue-soft:#eaf5fb;
      --green:#17845d;
      --green-soft:#e5f6ef;
      --amber:#b56a09;
      --amber-soft:#fff3dc;
      --red:#b63a3a;
      --red-soft:#fbe9e9;
      --ink:#17324d;
      --muted:#6c7e8d;
      --line:#dce6ed;
      --bg:#f4f8fb;
      --white:#fff;
      --shadow:0 10px 30px rgba(11,47,79,.08);
      --radius:16px;
      --sidebar:232px;
    }

    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:"Poppins",Arial,sans-serif}
    button,input,select{font:inherit}
    .mobile-header{display:none}
    .app{min-height:100vh;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr)}
    .sidebar{position:sticky;top:0;height:100vh;padding:24px 18px;background:linear-gradient(180deg,var(--navy),#082945);color:#fff;display:flex;flex-direction:column}
    .brand h1{margin:0;font:700 22px "Montserrat",sans-serif}
    .brand p{margin:5px 0 24px;color:#b9d4e5;font-size:12px}
    .nav{display:grid;gap:6px}
    .nav a,.signout{border:0;border-radius:10px;padding:12px 13px;color:#d9eaf4;background:transparent;text-decoration:none;display:flex;gap:11px;align-items:center;cursor:pointer;text-align:left}
    .nav a:hover,.nav a.active,.signout:hover{background:rgba(255,255,255,.11);color:#fff}
    .sidebar-footer{margin-top:auto;padding-top:18px;border-top:1px solid rgba(255,255,255,.14)}
    .user-name{font-weight:600;font-size:14px}
    .user-role{margin:3px 0 12px;color:#b9d4e5;font-size:12px}
    main{min-width:0;padding:26px}
    .topbar{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:20px}
    h2{margin:0;font:700 clamp(24px,3vw,30px) "Montserrat",sans-serif}
    .subtitle{margin:7px 0 0;color:var(--muted);font-size:14px}
    .button{border:0;border-radius:10px;padding:11px 15px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .button-primary{background:var(--blue);color:#fff}
    .button-secondary{background:var(--blue-soft);color:var(--navy)}
    .notice{display:none;margin-bottom:16px;padding:12px 14px;border-radius:11px;font-size:13px}
    .notice.show{display:block}
    .notice.error{background:var(--red-soft);color:#8d2525;border:1px solid #efc6c6}
    .notice.info{background:var(--blue-soft);color:#17628c;border:1px solid #c9e3f2}
    .filters{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:18px}
    .filter{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:8px 13px;cursor:pointer}
    .filter.active{background:var(--blue-soft);border-color:#bcdcec;color:var(--navy);font-weight:600}
    .property-section{margin-bottom:24px}
    .property-title{margin:0 0 11px;font:700 18px "Montserrat",sans-serif}
    .turnover-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
    .turnover-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:17px;display:grid;gap:13px}
    .card-top{display:flex;justify-content:space-between;gap:12px}
    .card-title{font-weight:700}
    .card-meta{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.5}
    .badge{display:inline-flex;align-items:center;height:max-content;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:600;text-transform:capitalize}
    .scheduled,.confirmed,.assigned,.requested{background:var(--blue-soft);color:#17628c}
    .in_progress,.started{background:var(--amber-soft);color:#885200}
    .completed,.submitted,.approved{background:var(--green-soft);color:#116b49}
    .cancelled,.declined,.rejected{background:var(--red-soft);color:#8b3030}
    .empty{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:34px;text-align:center;color:var(--muted)}
    .overlay{display:none}
    @media(max-width:820px){
      .app{display:block}
      .mobile-header{position:sticky;top:0;z-index:40;display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--navy);color:#fff}
      .mobile-header button{border:0;border-radius:8px;padding:8px 10px;background:rgba(255,255,255,.12);color:#fff}
      .sidebar{position:fixed;z-index:50;left:calc(var(--sidebar) * -1 - 20px);width:var(--sidebar);transition:left .2s}
      .sidebar.open{left:0}
      .overlay.show{display:block;position:fixed;inset:0;z-index:45;background:rgba(4,23,39,.42)}
      main{padding:18px 14px 28px}
      .topbar{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="mobile-header">
    <strong>NSC CleanOps</strong>
    <button id="menuButton" type="button">Menu</button>
  </div>

  <div class="overlay" id="overlay"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1>NSC CleanOps</h1>
        <p>Owner Portal</p>
      </div>

      <nav class="nav">
        <a href="owner-dashboard.html"><span>⌂</span><span>Dashboard</span></a>
        <a class="active" href="owner-turnovers.html"><span>✓</span><span>Turnovers & Documents</span></a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-name" id="userName">Loading account…</div>
        <div class="user-role">Property Owner</div>
        <button class="signout" id="signOutButton" type="button"><span>↪</span><span>Sign Out</span></button>
      </div>
    </aside>

    <main>
      <header class="topbar">
        <div>
          <h2>Turnovers & Documents</h2>
          <p class="subtitle">View upcoming, active and completed cleans for your assigned properties.</p>
        </div>
        <button class="button button-secondary" id="refreshButton" type="button">Refresh</button>
      </header>

      <div class="notice" id="notice"></div>

      <div class="filters">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="upcoming">Upcoming</button>
        <button class="filter" data-filter="active">Active</button>
        <button class="filter" data-filter="completed">Completed</button>
      </div>

      <div id="content">
        <div class="empty">Loading turnovers…</div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>

  <script>
    const db = window.nscSupabase;
    const state = {
      authUser: null,
      profile: null,
      properties: [],
      turnovers: [],
      filter: "all"
    };

    document.addEventListener("DOMContentLoaded", init);

    function bindEvents() {
      document.getElementById("signOutButton").addEventListener("click", signOut);
      document.getElementById("refreshButton").addEventListener("click", loadPage);
      document.getElementById("menuButton").addEventListener("click", openMenu);
      document.getElementById("overlay").addEventListener("click", closeMenu);

      document.querySelectorAll("[data-filter]").forEach(button => {
        button.addEventListener("click", () => {
          document.querySelectorAll("[data-filter]").forEach(x => x.classList.remove("active"));
          button.classList.add("active");
          state.filter = button.dataset.filter;
          render();
        });
      });
    }

    async function init() {
      bindEvents();

      if (!db) {
        showNotice("Supabase client was not found. Check supabase-client.js.", "error");
        return;
      }

      const { data: authData, error: authError } = await db.auth.getUser();

      if (authError || !authData?.user) {
        location.href = "login.html";
        return;
      }

      state.authUser = authData.user;

      const { data: profile, error: profileError } = await db
        .from("users")
        .select("*")
        .eq("auth_user_id", state.authUser.id)
        .maybeSingle();

      if (profileError || !profile || String(profile.role || "").toLowerCase() !== "owner" || profile.active !== true) {
        await db.auth.signOut();
        location.href = "login.html";
        return;
      }

      state.profile = profile;
      document.getElementById("userName").textContent =
        profile.full_name || profile.name || state.authUser.email || "Owner";

      await loadPage();
    }

    async function loadPage() {
      clearNotice();
      document.getElementById("content").innerHTML = '<div class="empty">Loading turnovers…</div>';

      const propertyIds = await loadAssignedPropertyIds();

      if (!propertyIds.length) {
        state.properties = [];
        state.turnovers = [];
        render();
        return;
      }

      const [{ data: properties, error: propertyError }, { data: turnovers, error: turnoverError }] =
        await Promise.all([
          db.from("properties").select("*").in("id", propertyIds).order("property_name", { ascending: true }),
          db.from("turnovers").select("*").in("property_id", propertyIds)
        ]);

      if (propertyError) {
        showNotice("Properties could not be loaded: " + propertyError.message, "error");
      }

      if (turnoverError) {
        showNotice("Turnovers could not be loaded: " + turnoverError.message, "error");
      }

      state.properties = properties || [];
      state.turnovers = turnovers || [];
      render();
    }

    async function loadAssignedPropertyIds() {
      const attempts = [
        { column: "user_id", value: state.profile.id },
        { column: "user_id", value: state.authUser.id },
        { column: "owner_id", value: state.profile.id }
      ];

      for (const attempt of attempts) {
        const { data, error } = await db
          .from("property_members")
          .select("property_id")
          .eq(attempt.column, attempt.value);

        if (!error && Array.isArray(data) && data.length) {
          return [...new Set(data.map(row => row.property_id).filter(Boolean))];
        }
      }

      return [];
    }

    function render() {
      const content = document.getElementById("content");

      if (!state.properties.length) {
        content.innerHTML = '<div class="empty">No properties are assigned to this owner account.</div>';
        return;
      }

      const filtered = state.turnovers.filter(matchesFilter);

      const sections = state.properties.map(property => {
        const propertyTurnovers = filtered
          .filter(turnover => turnover.property_id === property.id)
          .sort((a, b) => getDate(b) - getDate(a));

        if (!propertyTurnovers.length) return "";

        return `
          <section class="property-section">
            <h3 class="property-title">${escapeHtml(property.property_name || property.property_code || "Property")}</h3>
            <div class="turnover-grid">
              ${propertyTurnovers.map(renderCard).join("")}
            </div>
          </section>
        `;
      }).join("");

      content.innerHTML = sections || '<div class="empty">No turnovers match this filter.</div>';
    }

    function renderCard(turnover) {
      const status = normalizeStatus(turnover.status || "scheduled");
      const date = getDate(turnover);

      return `
        <article class="turnover-card">
          <div class="card-top">
            <div>
              <div class="card-title">${escapeHtml(formatDate(date))}</div>
              <div class="card-meta">${escapeHtml(formatTime(turnover, date))}</div>
            </div>
            <span class="badge ${escapeHtml(status)}">${escapeHtml(label(status))}</span>
          </div>

          <div class="card-meta">
            Guest check-in: ${escapeHtml(formatMaybeDate(turnover.guest_check_in || turnover.guest_checkin || turnover.guest_arrival))}
          </div>

          <a class="button button-primary" href="owner-turnover.html?id=${encodeURIComponent(turnover.id)}">
            View Clean Details
          </a>
        </article>
      `;
    }

    function matchesFilter(turnover) {
      const status = normalizeStatus(turnover.status || "scheduled");
      const date = getDate(turnover);
      const now = new Date();

      if (state.filter === "completed") {
        return ["completed", "approved", "submitted"].includes(status);
      }

      if (state.filter === "active") {
        return ["in_progress", "started", "confirmed", "assigned"].includes(status);
      }

      if (state.filter === "upcoming") {
        return date >= now && !["completed", "approved", "cancelled"].includes(status);
      }

      return true;
    }

    function getDate(turnover) {
      const value =
        turnover.scheduled_start ||
        turnover.start_time ||
        turnover.scheduled_at ||
        turnover.turnover_date ||
        turnover.scheduled_date ||
        turnover.cleaning_date ||
        turnover.date;

      if (turnover.scheduled_date && turnover.scheduled_time) {
        const combined = new Date(turnover.scheduled_date + "T" + turnover.scheduled_time);
        if (!isNaN(combined)) return combined;
      }

      const parsed = new Date(value);
      return isNaN(parsed) ? new Date(0) : parsed;
    }

    function formatDate(date) {
      if (!(date instanceof Date) || isNaN(date)) return "Date not set";
      return date.toLocaleDateString("en-CA", {
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric"
      });
    }

    function formatTime(turnover, date) {
      const hasTime = turnover.scheduled_start || turnover.start_time || turnover.scheduled_at || turnover.scheduled_time;
      if (!hasTime || !(date instanceof Date) || isNaN(date)) return "Time not set";
      return date.toLocaleTimeString("en-CA", { hour: "numeric", minute: "2-digit" });
    }

    function formatMaybeDate(value) {
      if (!value) return "Not recorded";
      const date = new Date(value);
      if (isNaN(date)) return String(value);
      return date.toLocaleString("en-CA", {
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function normalizeStatus(value) {
      return String(value || "scheduled").trim().toLowerCase().replace(/\s+/g, "_");
    }

    function label(value) {
      return String(value || "").replace(/_/g, " ").replace(/\b\w/g, x => x.toUpperCase());
    }

    function showNotice(message, type) {
      const notice = document.getElementById("notice");
      notice.className = "notice show " + type;
      notice.textContent = message;
    }

    function clearNotice() {
      const notice = document.getElementById("notice");
      notice.className = "notice";
      notice.textContent = "";
    }

    function openMenu() {
      document.getElementById("sidebar").classList.add("open");
      document.getElementById("overlay").classList.add("show");
    }

    function closeMenu() {
      document.getElementById("sidebar").classList.remove("open");
      document.getElementById("overlay").classList.remove("show");
    }

    async function signOut() {
      await db.auth.signOut();
      location.href = "login.html";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
