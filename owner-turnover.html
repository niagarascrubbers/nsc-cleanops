<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cleaning Details | NSC CleanOps</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #0b2f4f;
      --navy-light: #164f7a;
      --blue: #2e8bc0;
      --blue-soft: #eaf6fc;
      --background: #f4f8fb;
      --surface: #ffffff;
      --border: #dce7ef;
      --text: #17324d;
      --muted: #6c7f8f;
      --green: #16784b;
      --green-soft: #e8f7ef;
      --amber: #a56500;
      --amber-soft: #fff4dd;
      --red: #b83a3a;
      --red-soft: #fdeaea;
      --shadow: 0 14px 35px rgba(11, 47, 79, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: "Poppins", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 26px 20px;
      background: var(--navy);
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .brand h1 {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: 22px;
      font-weight: 800;
    }

    .brand p {
      margin: 5px 0 0;
      color: rgba(255,255,255,.65);
      font-size: 12px;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav a {
      padding: 13px 14px;
      border-radius: 11px;
      color: rgba(255,255,255,.76);
      font-weight: 500;
      transition: .2s ease;
    }

    .nav a:hover,
    .nav a.active {
      background: rgba(255,255,255,.12);
      color: #fff;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,.14);
    }

    .owner-name {
      font-weight: 600;
    }

    .owner-role {
      color: rgba(255,255,255,.6);
      font-size: 12px;
      margin-top: 3px;
    }

    .logout-button {
      width: 100%;
      margin-top: 15px;
      border: 1px solid rgba(255,255,255,.22);
      background: transparent;
      color: #fff;
      padding: 11px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    .main {
      min-width: 0;
    }

    .topbar {
      min-height: 78px;
      padding: 16px 30px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .page-title {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: 22px;
    }

    .breadcrumb {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .back-button,
    .button {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .back-button {
      background: var(--blue-soft);
      color: var(--navy-light);
    }

    .page {
      padding: 30px;
    }

    .hero {
      padding: 26px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      color: #fff;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      gap: 24px;
    }

    .hero h2 {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: 27px;
    }

    .hero-subtitle {
      margin-top: 8px;
      color: rgba(255,255,255,.76);
    }

    .hero-meta {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hero-pill {
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      font-size: 12px;
      font-weight: 600;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 10px;
    }

    .button-light {
      background: #fff;
      color: var(--navy);
    }

    .button-ghost {
      background: rgba(255,255,255,.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,.22);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .stat-card,
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .stat-card {
      padding: 20px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
    }

    .stat-value {
      margin-top: 7px;
      font-family: "Montserrat", sans-serif;
      font-size: 24px;
      font-weight: 800;
    }

    .stat-note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(310px, .85fr);
      gap: 20px;
      margin-top: 20px;
    }

    .panel {
      overflow: hidden;
    }

    .panel + .panel {
      margin-top: 20px;
    }

    .panel-header {
      padding: 19px 21px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }

    .panel-title {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: 16px;
    }

    .panel-body {
      padding: 18px 21px;
    }

    .badge {
      display: inline-flex;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge-blue {
      background: var(--blue-soft);
      color: var(--navy-light);
    }

    .badge-green {
      background: var(--green-soft);
      color: var(--green);
    }

    .badge-amber {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .badge-red {
      background: var(--red-soft);
      color: var(--red);
    }

    .progress-summary {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .progress-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf2f6;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
    }

    .room-list,
    .timeline,
    .issue-list,
    .notes-list {
      display: grid;
      gap: 12px;
    }

    .room-card,
    .timeline-item,
    .issue-card,
    .note-card {
      padding: 15px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #fff;
    }

    .room-top,
    .issue-top,
    .note-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }

    .room-title,
    .item-title {
      font-weight: 600;
    }

    .item-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .room-progress {
      margin-top: 10px;
    }

    .timeline {
      position: relative;
    }

    .timeline-item {
      position: relative;
      padding-left: 42px;
    }

    .timeline-dot {
      position: absolute;
      left: 16px;
      top: 19px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 0 5px var(--blue-soft);
    }

    .timeline-time {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .photo-card {
      position: relative;
      min-height: 150px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #edf3f7;
    }

    .photo-card img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      display: block;
    }

    .photo-caption {
      padding: 10px 11px;
      background: #fff;
      font-size: 12px;
      color: var(--muted);
    }

    .detail-list {
      display: grid;
      gap: 12px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .detail-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .detail-label {
      color: var(--muted);
      font-size: 13px;
    }

    .detail-value {
      text-align: right;
      font-weight: 600;
      font-size: 13px;
    }

    .empty,
    .loading-state,
    .error-state {
      padding: 34px 20px;
      text-align: center;
      color: var(--muted);
    }

    .error-state {
      color: var(--red);
    }

    .spinner {
      width: 34px;
      height: 34px;
      margin: 0 auto 13px;
      border: 3px solid #dfeaf1;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .mobile-header {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1050px) {
      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .app-shell {
        display: block;
      }

      .sidebar {
        display: none;
      }

      .topbar {
        position: static;
        padding: 14px 18px;
        align-items: stretch;
        flex-direction: column;
      }

      .mobile-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .mobile-logout {
        border: 0;
        background: transparent;
        color: var(--navy);
        font-weight: 600;
        cursor: pointer;
      }

      .page {
        padding: 18px;
      }

      .hero {
        padding: 22px;
        flex-direction: column;
      }

      .hero h2 {
        font-size: 23px;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }

      .photo-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 480px) {
      .stats-grid,
      .photo-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>NSC CleanOps</h1>
        <p>Owner Portal</p>
      </div>

      <nav class="nav">
        <a href="owner-dashboard.html">Dashboard</a>
        <a class="active" href="owner-property.html">Property</a>
        <a href="owner-messages.html">Messages</a>
        <a href="owner-documents.html">Documents</a>
        <a href="owner-reports.html">Reports</a>
        <a href="owner-settings.html">Settings</a>
      </nav>

      <div class="sidebar-footer">
        <div class="owner-name" id="sidebarOwnerName">Owner</div>
        <div class="owner-role">Property Owner</div>
        <button class="logout-button" id="logoutButton" type="button">Sign Out</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="mobile-header">
            <strong>NSC CleanOps</strong>
            <button class="mobile-logout" id="mobileLogoutButton" type="button">Sign Out</button>
          </div>

          <h1 class="page-title">Cleaning Details</h1>
          <div class="breadcrumb">Owner Portal / Property / Cleaning</div>
        </div>

        <button class="back-button" id="backButton" type="button">Back to Property</button>
      </header>

      <section class="page" id="pageContent">
        <div class="loading-state">
          <div class="spinner"></div>
          Loading cleaning details...
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>

  <script>
    "use strict";

    const db = window.nscSupabase || window.supabaseClient;
    const pageContent = document.getElementById("pageContent");

    let currentProfile = null;
    let turnover = null;
    let property = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "Not entered";

      const date = /^\d{4}-\d{2}-\d{2}$/.test(String(value))
        ? new Date(`${value}T12:00:00`)
        : new Date(value);

      if (Number.isNaN(date.getTime())) return "Not entered";

      return new Intl.DateTimeFormat("en-CA", {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      }).format(date);
    }

    function formatDateTime(value) {
      if (!value) return "Not recorded";

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Not recorded";

      return new Intl.DateTimeFormat("en-CA", {
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit"
      }).format(date);
    }

    function formatTime(value) {
      if (!value) return "Not entered";

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Not entered";

      return new Intl.DateTimeFormat("en-CA", {
        hour: "numeric",
        minute: "2-digit"
      }).format(date);
    }

    function formatStatus(value) {
      const labels = {
        unassigned: "Unassigned",
        assigned: "Assigned",
        accepted: "Accepted",
        declined: "Declined",
        in_progress: "In Progress",
        review_required: "Awaiting Review",
        correction_required: "Correction Required",
        completed: "Completed",
        cancelled: "Cancelled"
      };

      return labels[value] || String(value || "Unknown").replaceAll("_", " ");
    }

    function statusBadgeClass(value) {
      if (value === "completed") return "badge-green";
      if (value === "in_progress" || value === "accepted") return "badge-blue";
      if (value === "review_required" || value === "correction_required") return "badge-amber";
      if (value === "declined" || value === "cancelled") return "badge-red";
      return "badge-blue";
    }

    function getTurnoverId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id") || params.get("turnover_id");
    }

    async function requireOwnerSession() {
      if (!db) throw new Error("Supabase client is unavailable.");

      const {
        data: { session },
        error: sessionError
      } = await db.auth.getSession();

      if (sessionError) throw sessionError;

      if (!session) {
        window.location.href = "login.html";
        return false;
      }

      const { data: profile, error: profileError } = await db
        .from("users")
        .select("id, full_name, role, company_id, active")
        .eq("auth_user_id", session.user.id)
        .single();

      if (profileError) throw profileError;
      if (!profile?.active) throw new Error("This account is inactive.");
      if (String(profile.role || "").toLowerCase() !== "owner") {
        throw new Error("This page is only available to owner accounts.");
      }

      currentProfile = profile;
      document.getElementById("sidebarOwnerName").textContent =
        profile.full_name || "Owner";

      return true;
    }

    async function loadTurnover() {
      const turnoverId = getTurnoverId();

      if (!turnoverId) {
        throw new Error("No cleaning record was selected.");
      }

      const { data, error } = await db
        .from("turnovers")
        .select(`
          id,
          property_id,
          turnover_date,
          scheduled_start,
          scheduled_end,
          guest_checkin_time,
          status,
          check_in_time,
          check_out_time,
          completed_at,
          submitted_at,
          final_notes,
          manager_notes,
          cleaner_notes,
          created_at,
          properties (
            id,
            property_name,
            property_code,
            address,
            city,
            province,
            postal_code
          )
        `)
        .eq("id", turnoverId)
        .single();

      if (error) throw error;
      if (!data) throw new Error("The selected cleaning record could not be found.");
      if (data.status === "cancelled") {
        throw new Error("This cleaning was cancelled and is not available in the owner portal.");
      }

      turnover = data;
      property = data.properties;

      if (!property) {
        throw new Error("The property connected to this cleaning could not be loaded.");
      }

      const accessQueries = [
        () => db
          .from("property_members")
          .select("property_id, member_role, active")
          .eq("property_id", turnover.property_id)
          .eq("user_id", currentProfile.id)
          .maybeSingle(),

        () => db
          .from("property_members")
          .select("property_id, role")
          .eq("property_id", turnover.property_id)
          .eq("user_id", currentProfile.id)
          .maybeSingle()
      ];

      let accessRow = null;
      let lastError = null;

      for (const runQuery of accessQueries) {
        const { data: access, error: accessError } = await runQuery();

        if (!accessError) {
          accessRow = access;
          break;
        }

        lastError = accessError;
      }

      if (!accessRow) {
        throw lastError || new Error("You do not have access to this property.");
      }

      const role = String(accessRow.member_role || accessRow.role || "").toLowerCase();

      if (role !== "owner" || accessRow.active === false) {
        throw new Error("You do not have access to this property.");
      }
    }

    async function safeQuery(queryBuilder) {
      const { data, error } = await queryBuilder;

      if (error) {
        console.warn(error);
        return [];
      }

      return data || [];
    }

    async function loadRelatedData() {
      const [
        tasks,
        rooms,
        photos,
        issues,
        assignments,
        activity
      ] = await Promise.all([
        safeQuery(
          db.from("turnover_tasks")
            .select(`
              id,
              turnover_id,
              room_id,
              task_name,
              task_description,
              completed,
              completed_at,
              photo_required,
              required_photo_count,
              sort_order
            `)
            .eq("turnover_id", turnover.id)
            .order("sort_order")
        ),

        safeQuery(
          db.from("property_rooms")
            .select("id, room_name, room_type, sort_order")
            .eq("property_id", turnover.property_id)
            .eq("active", true)
            .order("sort_order")
        ),

        safeQuery(
          db.from("photos")
            .select(`
              id,
              turnover_id,
              room_id,
              task_id,
              photo_url,
              storage_path,
              caption,
              photo_type,
              created_at
            `)
            .eq("turnover_id", turnover.id)
            .order("created_at", { ascending: false })
        ),

        safeQuery(
          db.from("issues")
            .select(`
              id,
              room_id,
              issue_type,
              title,
              description,
              urgency,
              issue_status,
              prevents_guest_ready,
              created_at
            `)
            .eq("turnover_id", turnover.id)
            .neq("issue_status", "closed")
            .order("created_at", { ascending: false })
        ),

        safeQuery(
          db.from("turnover_assignments")
            .select(`
              id,
              cleaner_id,
              assignment_status,
              confirmed_at,
              declined_at,
              users (
                id,
                full_name
              )
            `)
            .eq("turnover_id", turnover.id)
        ),

        safeQuery(
          db.from("turnover_activity")
            .select("id, activity_type, title, description, created_at")
            .eq("turnover_id", turnover.id)
            .order("created_at", { ascending: false })
        )
      ]);

      return { tasks, rooms, photos, issues, assignments, activity };
    }

    function buildRoomSummaries(tasks, rooms) {
      const roomMap = new Map();

      rooms.forEach(room => {
        roomMap.set(room.id, {
          id: room.id,
          name: room.room_name || "Room",
          total: 0,
          completed: 0
        });
      });

      tasks.forEach(task => {
        const roomId = task.room_id || "general";

        if (!roomMap.has(roomId)) {
          roomMap.set(roomId, {
            id: roomId,
            name: roomId === "general" ? "General Tasks" : "Other Tasks",
            total: 0,
            completed: 0
          });
        }

        const summary = roomMap.get(roomId);
        summary.total += 1;
        if (task.completed) summary.completed += 1;
      });

      return Array.from(roomMap.values()).filter(room => room.total > 0);
    }

    function buildTimeline(data) {
      const items = [];

      if (turnover.created_at) {
        items.push({
          title: "Cleaning created",
          description: "This cleaning was added to the schedule.",
          date: turnover.created_at
        });
      }

      data.assignments.forEach(assignment => {
        const cleanerName = assignment.users?.full_name || "Cleaner";

        if (assignment.confirmed_at) {
          items.push({
            title: "Shift confirmed",
            description: `${cleanerName} confirmed the cleaning assignment.`,
            date: assignment.confirmed_at
          });
        }

        if (assignment.declined_at) {
          items.push({
            title: "Shift declined",
            description: `${cleanerName} declined the cleaning assignment.`,
            date: assignment.declined_at
          });
        }
      });

      if (turnover.check_in_time) {
        items.push({
          title: "Cleaner checked in",
          description: "On-site cleaning work started.",
          date: turnover.check_in_time
        });
      }

      if (turnover.submitted_at) {
        items.push({
          title: "Submitted for review",
          description: "The cleaning was submitted to management for review.",
          date: turnover.submitted_at
        });
      }

      if (turnover.check_out_time) {
        items.push({
          title: "Cleaner checked out",
          description: "The cleaner completed the on-site visit.",
          date: turnover.check_out_time
        });
      }

      if (turnover.completed_at) {
        items.push({
          title: "Cleaning approved",
          description: "Management marked the cleaning as completed.",
          date: turnover.completed_at
        });
      }

      data.activity.forEach(item => {
        items.push({
          title: item.title || String(item.activity_type || "Activity").replaceAll("_", " "),
          description: item.description || "",
          date: item.created_at
        });
      });

      return items
        .filter(item => item.date)
        .sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    function resolvePhotoUrl(photo) {
      if (photo.photo_url) return photo.photo_url;

      if (photo.storage_path && db.storage) {
        const buckets = ["turnover-photos", "photos", "cleaning-photos"];

        for (const bucket of buckets) {
          const { data } = db.storage.from(bucket).getPublicUrl(photo.storage_path);
          if (data?.publicUrl) return data.publicUrl;
        }
      }

      return "";
    }

    function renderRooms(roomSummaries) {
      if (!roomSummaries.length) {
        return '<div class="empty">Checklist progress is not available yet.</div>';
      }

      return `
        <div class="room-list">
          ${roomSummaries.map(room => {
            const percentage = room.total
              ? Math.round((room.completed / room.total) * 100)
              : 0;

            return `
              <div class="room-card">
                <div class="room-top">
                  <div>
                    <div class="room-title">${escapeHtml(room.name)}</div>
                    <div class="item-subtitle">${room.completed} of ${room.total} tasks completed</div>
                  </div>
                  <span class="badge ${percentage === 100 ? "badge-green" : "badge-blue"}">
                    ${percentage}%
                  </span>
                </div>

                <div class="room-progress">
                  <div class="progress-track">
                    <div class="progress-fill" style="width:${percentage}%"></div>
                  </div>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderPhotos(photos) {
      if (!photos.length) {
        return '<div class="empty">No cleaning photos have been uploaded yet.</div>';
      }

      return `
        <div class="photo-grid">
          ${photos.map(photo => {
            const url = resolvePhotoUrl(photo);

            if (!url) return "";

            return `
              <a class="photo-card" href="${escapeHtml(url)}" target="_blank" rel="noopener">
                <img src="${escapeHtml(url)}" alt="${escapeHtml(photo.caption || "Cleaning photo")}">
                <div class="photo-caption">
                  ${escapeHtml(
                    photo.caption ||
                    String(photo.photo_type || "Cleaning photo").replaceAll("_", " ")
                  )}
                </div>
              </a>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderIssues(issues) {
      if (!issues.length) {
        return '<div class="empty">No issues were reported for this cleaning.</div>';
      }

      return `
        <div class="issue-list">
          ${issues.map(issue => `
            <div class="issue-card">
              <div class="issue-top">
                <div>
                  <div class="item-title">${escapeHtml(issue.title || "Cleaning issue")}</div>
                  <div class="item-subtitle">
                    ${escapeHtml(issue.description || "No additional details entered.")}
                  </div>
                </div>

                <span class="badge ${
                  issue.urgency === "emergency" || issue.urgency === "urgent"
                    ? "badge-red"
                    : issue.urgency === "important"
                      ? "badge-amber"
                      : "badge-blue"
                }">
                  ${escapeHtml(String(issue.urgency || "normal").replaceAll("_", " "))}
                </span>
              </div>

              <div class="item-subtitle" style="margin-top:10px;">
                Status: ${escapeHtml(String(issue.issue_status || "open").replaceAll("_", " "))}
                ${issue.prevents_guest_ready ? " · Prevents guest-ready completion" : ""}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderNotes() {
      const notes = [
        {
          label: "Cleaner Notes",
          value: turnover.cleaner_notes
        },
        {
          label: "Manager Notes",
          value: turnover.manager_notes
        },
        {
          label: "Completion Notes",
          value: turnover.final_notes
        }
      ].filter(item => item.value);

      if (!notes.length) {
        return '<div class="empty">No notes have been added to this cleaning.</div>';
      }

      return `
        <div class="notes-list">
          ${notes.map(note => `
            <div class="note-card">
              <div class="note-top">
                <div>
                  <div class="item-title">${escapeHtml(note.label)}</div>
                  <div class="item-subtitle">${escapeHtml(note.value)}</div>
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderTimeline(items) {
      if (!items.length) {
        return '<div class="empty">No timeline activity is available yet.</div>';
      }

      return `
        <div class="timeline">
          ${items.map(item => `
            <div class="timeline-item">
              <span class="timeline-dot"></span>
              <div class="item-title">${escapeHtml(item.title)}</div>
              ${item.description ? `<div class="item-subtitle">${escapeHtml(item.description)}</div>` : ""}
              <div class="timeline-time">${escapeHtml(formatDateTime(item.date))}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderAssignments(assignments) {
      if (!assignments.length) return "Not assigned";

      return assignments
        .map(item => item.users?.full_name || "Cleaner")
        .join(", ");
    }

    function renderPage(data) {
      const totalTasks = data.tasks.length;
      const completedTasks = data.tasks.filter(task => task.completed).length;
      const percentage = totalTasks
        ? Math.round((completedTasks / totalTasks) * 100)
        : 0;

      const roomSummaries = buildRoomSummaries(data.tasks, data.rooms);
      const timelineItems = buildTimeline(data);
      const propertyAddress = [
        property.address,
        property.city,
        property.province,
        property.postal_code
      ].filter(Boolean).join(", ");

      const photoCount = data.photos.length;
      const openIssueCount = data.issues.filter(issue =>
        !["resolved", "closed"].includes(issue.issue_status)
      ).length;

      pageContent.innerHTML = `
        <section class="hero">
          <div>
            <h2>${escapeHtml(property.property_name || "Property")}</h2>
            <div class="hero-subtitle">
              ${escapeHtml(formatDate(turnover.turnover_date))}
              ${propertyAddress ? ` · ${escapeHtml(propertyAddress)}` : ""}
            </div>

            <div class="hero-meta">
              <span class="hero-pill">${escapeHtml(formatStatus(turnover.status))}</span>
              ${property.property_code ? `<span class="hero-pill">${escapeHtml(property.property_code)}</span>` : ""}
              ${turnover.guest_checkin_time ? `<span class="hero-pill">Guest check-in: ${escapeHtml(formatDateTime(turnover.guest_checkin_time))}</span>` : ""}
            </div>
          </div>

          <div class="hero-actions">
            <a class="button button-light" href="owner-messages.html?property_id=${encodeURIComponent(property.id)}&turnover_id=${encodeURIComponent(turnover.id)}">
              Message Manager
            </a>
            <a class="button button-ghost" href="owner-reports.html?property_id=${encodeURIComponent(property.id)}">
              View Reports
            </a>
          </div>
        </section>

        <section class="stats-grid">
          <article class="stat-card">
            <div class="stat-label">Cleaning Status</div>
            <div class="stat-value" style="font-size:20px;">
              ${escapeHtml(formatStatus(turnover.status))}
            </div>
            <div class="stat-note">Current workflow stage</div>
          </article>

          <article class="stat-card">
            <div class="stat-label">Checklist Progress</div>
            <div class="stat-value">${percentage}%</div>
            <div class="stat-note">${completedTasks} of ${totalTasks} tasks completed</div>
          </article>

          <article class="stat-card">
            <div class="stat-label">Photos Uploaded</div>
            <div class="stat-value">${photoCount}</div>
            <div class="stat-note">Cleaning and issue photos</div>
          </article>

          <article class="stat-card">
            <div class="stat-label">Open Issues</div>
            <div class="stat-value">${openIssueCount}</div>
            <div class="stat-note">Unresolved cleaning concerns</div>
          </article>
        </section>

        <section class="content-grid">
          <div>
            <article class="panel">
              <div class="panel-header">
                <h3 class="panel-title">Checklist Progress</h3>
                <span class="badge ${percentage === 100 ? "badge-green" : "badge-blue"}">
                  ${percentage}% complete
                </span>
              </div>

              <div class="panel-body">
                <div class="progress-summary">
                  <span>${completedTasks} completed</span>
                  <span>${Math.max(totalTasks - completedTasks, 0)} remaining</span>
                </div>

                <div class="progress-track" style="margin-bottom:18px;">
                  <div class="progress-fill" style="width:${percentage}%"></div>
                </div>

                ${renderRooms(roomSummaries)}
              </div>
            </article>

            <article class="panel">
              <div class="panel-header">
                <h3 class="panel-title">Cleaning Photos</h3>
                <span class="badge badge-blue">${photoCount} photos</span>
              </div>
              <div class="panel-body">
                ${renderPhotos(data.photos)}
              </div>
            </article>

            <article class="panel">
              <div class="panel-header">
                <h3 class="panel-title">Notes</h3>
              </div>
              <div class="panel-body">
                ${renderNotes()}
              </div>
            </article>
          </div>

          <div>
            <article class="panel">
              <div class="panel-header">
                <h3 class="panel-title">Cleaning Details</h3>
              </div>
              <div class="panel-body">
                <div class="detail-list">
                  <div class="detail-row">
                    <div class="detail-label">Scheduled date</div>
                    <div class="detail-value">${escapeHtml(formatDate(turnover.turnover_date))}</div>
                  </div>

                  <div class="detail-row">
                    <div class="detail-label">Scheduled start</div>
                    <div class="detail-value">${escapeHtml(formatTime(turnover.scheduled_start))}</div>
                  </div>

                  <div class="detail-row">
                    <div class="detail-label">Scheduled end</div>
                    <div class="detail-value">${escapeHtml(formatTime(turnover.scheduled_end))}</div>
                  </div>

                  <div class="detail-row">
                    <div class="detail-label">Assigned cleaner</div>
                    <div class="detail-value">${escapeHtml(renderAssignments(data.assignments))}</div>
                  </div>

                  <div class="detail-row">
                    <div class="detail-label">Checked in</div>
                    <div class="detail-value">${escapeHtml(formatDateTime(turnover.check_in_time))}</div>
                  </div>

                  <div class="detail-row">
                    <div class="detail-label">Checked out</div>
                    <div class="detail-value">${escapeHtml(formatDateTime(turnover.check_out_time))}</div>
                  </div>

                  <div class="detail-row">
                    <div class="detail-label">Approved</div>
                    <div class="detail-value">${escapeHtml(formatDateTime(turnover.completed_at))}</div>
                  </div>
                </div>
              </div>
            </article>

            <article class="panel">
              <div class="panel-header">
                <h3 class="panel-title">Cleaning Timeline</h3>
              </div>
              <div class="panel-body">
                ${renderTimeline(timelineItems)}
              </div>
            </article>

            <article class="panel">
              <div class="panel-header">
                <h3 class="panel-title">Reported Issues</h3>
              </div>
              <div class="panel-body">
                ${renderIssues(data.issues)}
              </div>
            </article>
          </div>
        </section>
      `;
    }

    function renderError(message) {
      pageContent.innerHTML = `
        <div class="panel">
          <div class="error-state">
            <strong>Cleaning details could not be loaded.</strong>
            <div style="margin-top:8px;">${escapeHtml(message)}</div>
          </div>
        </div>
      `;
    }

    async function signOut() {
      await db.auth.signOut();
      window.location.href = "login.html";
    }

    function goBackToProperty() {
      const propertyId = turnover?.property_id || localStorage.getItem("nsc_owner_property_id");

      if (propertyId) {
        window.location.href =
          `owner-property.html?property_id=${encodeURIComponent(propertyId)}`;
        return;
      }

      window.location.href = "owner-dashboard.html";
    }

    async function initializePage() {
      await requireOwnerSession();
      await loadTurnover();
      const relatedData = await loadRelatedData();
      renderPage(relatedData);
    }

    document.getElementById("logoutButton").addEventListener("click", signOut);
    document.getElementById("mobileLogoutButton").addEventListener("click", signOut);
    document.getElementById("backButton").addEventListener("click", goBackToProperty);

    initializePage().catch(error => {
      console.error(error);
      renderError(error.message);
    });
  </script>
</body>
</html>
