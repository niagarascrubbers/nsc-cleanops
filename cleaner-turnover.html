<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnover Checklist | NSC CleanOps</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #071f35;
      --navy-light: #0b2f4f;
      --blue: #2f8fca;
      --blue-hover: #257daf;
      --blue-light: #eaf6fc;
      --background: #f5f8fb;
      --border: #dfe8ef;
      --text: #17324d;
      --muted: #6c7e8f;
      --success: #1f8f64;
      --success-light: #e9f8f1;
      --warning: #aa7214;
      --warning-light: #fff8e7;
      --danger: #c94747;
      --danger-light: #fff0f0;
      --shadow: 0 12px 32px rgba(18, 50, 77, 0.09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: "Poppins", sans-serif;
    }

    button, input, textarea { font: inherit; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--navy);
      color: white;
      box-shadow: 0 8px 24px rgba(7, 31, 53, 0.16);
    }

    .header-inner {
      width: min(1120px, calc(100% - 32px));
      min-height: 72px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 11px;
      background: var(--blue);
      font-family: "Montserrat", sans-serif;
      font-size: 12px;
      font-weight: 700;
    }

    .brand-title {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: 15px;
      font-weight: 700;
    }

    .brand-subtitle {
      margin-top: 2px;
      color: #a8c0d1;
      font-size: 10px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .header-button {
      min-height: 38px;
      padding: 8px 13px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 9px;
      background: rgba(255,255,255,.07);
      color: white;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 48px;
    }

    .overview-card,
    .room-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .overview-card {
      padding: 20px;
      margin-bottom: 18px;
    }

    .overview-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .property-name {
      margin: 0;
      color: var(--navy-light);
      font-family: "Montserrat", sans-serif;
      font-size: 24px;
    }

    .property-location {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--warning-light);
      color: var(--warning);
      font-size: 9px;
      font-weight: 600;
      white-space: nowrap;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .overview-item {
      padding: 12px;
      border: 1px solid #edf2f6;
      border-radius: 10px;
      background: #f8fafc;
    }

    .overview-label {
      color: var(--muted);
      font-size: 8px;
      font-weight: 600;
      letter-spacing: .4px;
      text-transform: uppercase;
    }

    .overview-value {
      margin-top: 5px;
      color: var(--navy-light);
      font-size: 10px;
      font-weight: 600;
      line-height: 1.5;
    }

    .progress-card {
      margin-top: 17px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 10px;
    }

    .progress-track {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: #e8eff4;
    }

    .progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 999px;
      transition: width .2s ease;
    }

    .room-list {
      display: grid;
      gap: 15px;
    }

    .room-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }

    .room-title {
      margin: 0;
      color: var(--navy-light);
      font-family: "Montserrat", sans-serif;
      font-size: 16px;
    }

    .room-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 9px;
    }

    .task-list {
      display: grid;
    }

    .task-item {
      display: grid;
      grid-template-columns: 28px minmax(0,1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 15px 18px;
      border-bottom: 1px solid #edf2f6;
    }

    .task-item:last-child {
      border-bottom: 0;
    }

    .task-number {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--blue-light);
      color: #2078a9;
      font-size: 9px;
      font-weight: 700;
    }

    .task-title {
      color: var(--navy-light);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.5;
    }

    .task-instructions {
      margin-top: 4px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.5;
    }

    .task-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }

    .task-badge {
      min-height: 22px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #f1f5f8;
      color: #536b7e;
      font-size: 8px;
      font-weight: 600;
    }

    .task-badge.required {
      background: var(--warning-light);
      color: var(--warning);
    }

    .task-badge.complete {
      background: var(--success-light);
      color: var(--success);
    }

    .task-controls {
      display: grid;
      gap: 8px;
      min-width: 150px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid transparent;
      border-radius: 9px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: .58;
    }

    .button-primary {
      color: white;
      background: var(--navy-light);
    }

    .button-primary:hover:not(:disabled) {
      background: var(--navy);
    }

    .button-secondary {
      color: var(--text);
      background: white;
      border-color: var(--border);
    }

    .button-success {
      color: var(--success);
      background: var(--success-light);
      border-color: #c9eadc;
    }

    .button-danger {
      color: var(--danger);
      background: white;
      border-color: #efcaca;
    }


    .photo-panel {
      margin-top: 10px;
      padding: 11px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fbfdfe;
    }

    .photo-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 9px;
    }

    .photo-panel-title {
      color: var(--navy-light);
      font-size: 9px;
      font-weight: 600;
    }

    .photo-count {
      color: var(--muted);
      font-size: 8px;
      font-weight: 600;
    }

    .photo-upload-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .photo-input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .photo-help {
      color: var(--muted);
      font-size: 8px;
      line-height: 1.5;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .photo-preview {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: white;
    }

    .photo-preview img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .photo-preview-label {
      padding: 6px;
      color: var(--muted);
      font-size: 7px;
      text-align: center;
    }

    .photo-requirement-missing {
      margin-top: 8px;
      color: var(--danger);
      font-size: 8px;
      font-weight: 600;
    }

    .notes-box {
      margin-top: 9px;
      display: grid;
      gap: 7px;
    }

    .notes-box textarea {
      width: 100%;
      min-height: 72px;
      padding: 10px 11px;
      border: 1px solid var(--border);
      border-radius: 9px;
      resize: vertical;
      color: var(--text);
      font-size: 10px;
      outline: none;
    }

    .notes-box textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47,143,202,.12);
    }

    .submit-bar {
      position: sticky;
      bottom: 0;
      z-index: 15;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-top: 20px;
      padding: 14px 16px;
      background: rgba(255,255,255,.97);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 16px 36px rgba(7,31,53,.16);
      backdrop-filter: blur(10px);
    }

    .submit-text {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.5;
    }



    .gps-card {
      margin-bottom: 18px;
      padding: 18px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .gps-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .gps-card-title {
      margin: 0;
      color: var(--navy-light);
      font-family: "Montserrat", sans-serif;
      font-size: 16px;
    }

    .gps-card-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.5;
    }

    .gps-status-badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f1f5f8;
      color: #536b7e;
      font-size: 8px;
      font-weight: 700;
      white-space: nowrap;
    }

    .gps-status-badge.active {
      background: var(--success-light);
      color: var(--success);
    }

    .gps-status-badge.complete {
      background: var(--blue-light);
      color: #2078a9;
    }

    .gps-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .gps-item {
      padding: 11px;
      border: 1px solid #edf2f6;
      border-radius: 10px;
      background: #f8fafc;
    }

    .gps-label {
      color: var(--muted);
      font-size: 8px;
      font-weight: 600;
      letter-spacing: .3px;
      text-transform: uppercase;
    }

    .gps-value {
      margin-top: 4px;
      color: var(--navy-light);
      font-size: 10px;
      font-weight: 600;
      line-height: 1.5;
      word-break: break-word;
    }

    .gps-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 14px;
    }

    .gps-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 8px;
      line-height: 1.5;
    }

    .gps-warning {
      margin-top: 10px;
      padding: 9px 10px;
      border: 1px solid #efd9a5;
      border-radius: 9px;
      background: var(--warning-light);
      color: var(--warning);
      font-size: 8px;
      font-weight: 600;
      line-height: 1.5;
    }

    .checklist-toolbar {
      position: sticky;
      top: 82px;
      z-index: 12;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: rgba(245, 248, 251, .96);
      backdrop-filter: blur(10px);
    }

    .remaining-toggle.active {
      color: white;
      background: var(--blue);
      border-color: var(--blue);
    }

    .room-card {
      overflow: hidden;
    }

    .room-header {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      text-align: left;
      cursor: pointer;
      background: white;
      border: 0;
    }

    .room-header:hover {
      background: #fbfdfe;
    }

    .room-header-main {
      min-width: 0;
    }

    .room-heading-row {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .room-chevron {
      width: 20px;
      color: var(--blue);
      font-size: 15px;
      font-weight: 700;
      transition: transform .2s ease;
    }

    .room-card.open .room-chevron {
      transform: rotate(90deg);
    }

    .room-progress-summary {
      color: var(--navy-light);
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
    }

    .room-progress-track {
      height: 6px;
      margin-top: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: #e8eff4;
    }

    .room-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--blue);
      transition: width .2s ease;
    }

    .room-card.complete .room-progress-fill {
      background: var(--success);
    }

    .room-card.complete .room-title,
    .room-card.complete .room-progress-summary {
      color: var(--success);
    }

    .room-body {
      display: none;
      border-top: 1px solid var(--border);
    }

    .room-card.open .room-body {
      display: block;
    }

    .room-empty {
      padding: 20px 18px;
      color: var(--muted);
      font-size: 10px;
      text-align: center;
    }

    .remaining-panel {
      display: none;
      margin-bottom: 15px;
      overflow: hidden;
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .remaining-panel.visible {
      display: block;
    }

    .remaining-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 17px;
      border-bottom: 1px solid var(--border);
    }

    .remaining-panel-title {
      margin: 0;
      color: var(--navy-light);
      font-family: "Montserrat", sans-serif;
      font-size: 15px;
    }

    .remaining-list {
      display: grid;
    }

    .remaining-room {
      border-bottom: 1px solid #edf2f6;
    }

    .remaining-room:last-child {
      border-bottom: 0;
    }

    .remaining-room-title {
      padding: 12px 17px 6px;
      color: var(--navy-light);
      font-size: 10px;
      font-weight: 700;
    }

    .remaining-item {
      width: 100%;
      display: flex;
      gap: 9px;
      align-items: flex-start;
      padding: 8px 17px 11px;
      border: 0;
      background: white;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font-size: 9px;
      line-height: 1.5;
    }

    .remaining-item:hover {
      background: #f8fbfd;
    }

    .remaining-box {
      flex: 0 0 auto;
      width: 15px;
      height: 15px;
      margin-top: 1px;
      border: 1px solid #b9cad7;
      border-radius: 4px;
      background: white;
    }

    .remaining-photo {
      display: block;
      margin-top: 3px;
      color: var(--danger);
      font-size: 8px;
      font-weight: 600;
    }


    .inventory-list {
      display: grid;
    }

    .inventory-item {
      padding: 15px 18px;
      border-bottom: 1px solid #edf2f6;
    }

    .inventory-item:last-child {
      border-bottom: 0;
    }

    .inventory-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .inventory-item-name {
      color: var(--navy-light);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.5;
    }

    .inventory-location {
      margin-top: 3px;
      color: var(--muted);
      font-size: 8px;
    }

    .inventory-saved {
      color: var(--success);
      font-size: 8px;
      font-weight: 600;
    }

    .inventory-quantity-row {
      display: grid;
      grid-template-columns: auto minmax(90px, 130px) auto minmax(0, 1fr);
      align-items: center;
      gap: 9px;
    }

    .inventory-step-button {
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: white;
      color: var(--navy-light);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .inventory-step-button:hover:not(:disabled) {
      border-color: var(--blue);
      background: var(--blue-light);
    }

    .inventory-quantity-input {
      width: 100%;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: white;
      color: var(--navy-light);
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    .inventory-quantity-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47,143,202,.12);
    }

    .inventory-target {
      color: var(--muted);
      font-size: 9px;
      line-height: 1.5;
    }

    .inventory-status {
      display: inline-flex;
      align-items: center;
      min-height: 25px;
      margin-top: 9px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f1f5f8;
      color: #536b7e;
      font-size: 8px;
      font-weight: 700;
    }

    .inventory-status.full {
      background: var(--success-light);
      color: var(--success);
    }

    .inventory-status.low {
      background: var(--warning-light);
      color: var(--warning);
    }

    .inventory-status.out,
    .inventory-status.emergency {
      background: var(--danger-light);
      color: var(--danger);
    }

    .inventory-emergency-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 9px;
    }

    .inventory-emergency-row input {
      width: 16px;
      height: 16px;
    }

    .inventory-option {
      position: relative;
    }

    .inventory-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .inventory-option label {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: white;
      color: var(--muted);
      font-size: 8px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
    }

    .inventory-option input:checked + label {
      border-color: var(--blue);
      background: var(--blue-light);
      color: #2078a9;
      box-shadow: 0 0 0 2px rgba(47,143,202,.09);
    }

    .inventory-option.low input:checked + label {
      border-color: #e5c170;
      background: var(--warning-light);
      color: var(--warning);
    }

    .inventory-option.out input:checked + label,
    .inventory-option.emergency input:checked + label {
      border-color: #efbaba;
      background: var(--danger-light);
      color: var(--danger);
    }

    .inventory-note {
      width: 100%;
      min-height: 58px;
      margin-top: 9px;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 9px;
      resize: vertical;
      color: var(--text);
      font-size: 9px;
      outline: none;
    }

    .inventory-note:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47,143,202,.12);
    }

    .inventory-empty {
      padding: 22px 18px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.6;
      text-align: center;
    }

    .loading,
    .error {
      padding: 70px 20px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .spinner {
      width: 34px;
      height: 34px;
      margin: 0 auto 14px;
      border: 3px solid #dcecf4;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .state-title {
      margin: 0 0 7px;
      color: var(--navy-light);
      font-family: "Montserrat", sans-serif;
      font-size: 16px;
    }

    .state-text {
      max-width: 520px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 60;
      width: min(360px, calc(100vw - 36px));
      padding: 13px 15px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--success);
      border-radius: 10px;
      background: white;
      box-shadow: 0 20px 50px rgba(7,31,53,.2);
      color: var(--text);
      font-size: 10px;
      line-height: 1.5;
    }

    .toast.error {
      border-left-color: var(--danger);
    }

    @media (max-width: 800px) {
      .overview-grid,
      .gps-grid {
        grid-template-columns: repeat(2, minmax(0,1fr));
      }

      .task-item {
        grid-template-columns: 28px minmax(0,1fr);
      }

      .task-controls {
        grid-column: 2;
        min-width: 0;
        grid-template-columns: repeat(2, minmax(0,1fr));
      }

      .checklist-toolbar {
        top: 78px;
        align-items: stretch;
        flex-direction: column;
      }

      .checklist-toolbar .button {
        width: 100%;
      }

      .room-header {
        grid-template-columns: 1fr;
      }

      .room-progress-summary {
        padding-left: 29px;
      }

      .inventory-quantity-row {
        grid-template-columns: auto minmax(80px, 1fr) auto;
      }

      .inventory-target {
        grid-column: 1 / -1;
      }

      .submit-bar {
        align-items: stretch;
        flex-direction: column;
      }

      .submit-bar .button {
        width: 100%;
      }
    }

    @media (max-width: 500px) {
      .header-inner,
      .page {
        width: min(100% - 22px, 1120px);
      }

      .overview-header {
        flex-direction: column;
      }

      .overview-grid,
      .gps-grid {
        grid-template-columns: 1fr;
      }

      .task-item {
        grid-template-columns: 1fr;
      }

      .task-number,
      .task-controls {
        grid-column: 1;
      }

      .task-controls {
        grid-template-columns: 1fr;
      }

      .brand-subtitle {
        display: none;
      }
    }
  </style>
</head>

<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">NSC</div>
        <div>
          <p class="brand-title">NSC CleanOps</p>
          <div class="brand-subtitle">Cleaner Turnover Checklist · GPS Clock v6</div>
        </div>
      </div>

      <div class="header-actions">
        <button class="header-button" id="backButton" type="button">Assignments</button>
        <button class="header-button" id="logoutButton" type="button">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="page" id="pageContent">
    <div class="loading">
      <div class="spinner"></div>
      <h1 class="state-title">Loading turnover checklist</h1>
      <p class="state-text">Retrieving property details and assigned checklist tasks.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>

  <script>
    "use strict";

    console.info("NSC Cleaner Turnover GPS Clock v6 loaded");

    const db = window.nscSupabase || window.supabaseClient;
    const pageContent = document.getElementById("pageContent");

    let currentProfile = null;
    let turnover = null;
    let tasks = [];
    let taskPhotos = [];
    let templateRoomMap = new Map();
    let roomGroups = [];
    let displayedTasks = [];
    let inventoryItems = [];
    let inventoryCounts = [];
    let openRoomKeys = new Set();
    let roomsInitialized = false;
    let remainingOnly = false;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getTurnoverId() {
      return new URLSearchParams(window.location.search).get("id");
    }

    function showToast(message, type = "success") {
      document.querySelector(".toast")?.remove();

      const toast = document.createElement("div");
      toast.className = `toast ${type === "error" ? "error" : ""}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      window.setTimeout(() => toast.remove(), 4300);
    }

    function formatDate(value) {
      if (!value) return "Not scheduled";

      return new Intl.DateTimeFormat("en-CA", {
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric"
      }).format(new Date(`${value}T12:00:00`));
    }

    function formatTime(value) {
      if (!value) return "Not entered";

      return new Intl.DateTimeFormat("en-CA", {
        hour: "numeric",
        minute: "2-digit"
      }).format(new Date(value));
    }

    async function requireSession() {
      if (!db) throw new Error("Supabase client is unavailable.");

      const {
        data: { session },
        error: sessionError
      } = await db.auth.getSession();

      if (sessionError) throw sessionError;

      if (!session) {
        window.location.href = "login.html";
        return false;
      }

      const { data: profile, error: profileError } = await db
        .from("users")
        .select("id, full_name, role, company_id, active")
        .eq("auth_user_id", session.user.id)
        .single();

      if (profileError) throw profileError;
      if (!profile?.active) throw new Error("This user account is inactive.");

      currentProfile = profile;
      return true;
    }

    async function loadTurnover() {
      const turnoverId = getTurnoverId();

      if (!turnoverId) {
        throw new Error("No turnover was selected.");
      }

      const { data, error } = await db
        .from("turnovers")
        .select(`
          id,
          property_id,
          company_id,
          assigned_user_id,
          turnover_date,
          scheduled_start,
          scheduled_end,
          guest_checkout_time,
          guest_checkin_time,
          status,
          priority,
          final_notes,
          check_in_time,
          check_out_time,
          check_in_latitude,
          check_in_longitude,
          check_in_accuracy,
          check_in_distance,
          check_out_latitude,
          check_out_longitude,
          check_out_accuracy,
          check_out_distance,
          properties (
            property_name,
            property_code,
            address,
            city,
            province,
            latitude,
            longitude
          )
        `)
        .eq("id", turnoverId)
        .single();

      if (error) throw error;

      if (data.assigned_user_id !== currentProfile.id && !["admin", "manager"].includes(currentProfile.role)) {
        throw new Error("You are not assigned to this turnover.");
      }

      turnover = data;
    }

    async function loadTasks() {
      const { data, error } = await db
        .from("turnover_tasks")
        .select(`
          id,
          turnover_id,
          template_item_id,
          room_id,
          section_name,
          task_text,
          task_code,
          required_photo_count,
          task_status,
          cleaner_note,
          is_required,
          photo_required,
          notes_required,
          task_type,
          category,
          cleaner_instructions,
          estimated_minutes,
          required_supplies,
          sort_order,
          rooms (
            room_name,
            room_code
          )
        `)
        .eq("turnover_id", turnover.id)
        .order("sort_order", { ascending: true })
        .order("task_text", { ascending: true });

      if (error) throw error;
      tasks = Array.isArray(data) ? data : [];
    }


    async function loadTemplateRoomNames() {
      const templateItemIds = [
        ...new Set(
          tasks
            .map(task => task.template_item_id)
            .filter(Boolean)
        )
      ];

      templateRoomMap = new Map();

      if (!templateItemIds.length) return;

      const { data, error } = await db
        .from("checklist_template_items")
        .select(`
          id,
          room_id,
          section_name,
          rooms (
            room_name,
            room_code,
            sort_order
          )
        `)
        .in("id", templateItemIds);

      if (error) throw error;

      (data || []).forEach(item => {
        templateRoomMap.set(item.id, {
          roomId: item.room_id || null,
          roomName:
            item.rooms?.room_name ||
            item.section_name ||
            "General Tasks",
          roomCode: item.rooms?.room_code || "",
          roomSortOrder: Number(item.rooms?.sort_order) || 0
        });
      });
    }

    function getPhysicalRoom(task) {
      const templateRoom = templateRoomMap.get(task.template_item_id);

      if (templateRoom) {
        return templateRoom;
      }

      return {
        roomId: task.room_id || null,
        roomName:
          task.rooms?.room_name ||
          task.section_name ||
          "General Tasks",
        roomCode: task.rooms?.room_code || "",
        roomSortOrder: 0
      };
    }




    async function loadInventory() {
      const [itemsResult, countsResult] = await Promise.all([
        db
          .from("inventory_items")
          .select(`
            id,
            property_id,
            item_name,
            item_code,
            category,
            unit_name,
            location_note,
            minimum_quantity,
            amber_quantity,
            target_quantity,
            emergency_stock,
            active,
            sort_order
          `)
          .eq("property_id", turnover.property_id)
          .eq("active", true)
          .order("sort_order", { ascending: true })
          .order("item_name", { ascending: true }),

        db
          .from("inventory_counts")
          .select(`
            id,
            turnover_id,
            inventory_item_id,
            quantity_remaining,
            level_status,
            stock_status,
            emergency_stock_used,
            cleaner_note,
            counted_by,
            counted_at
          `)
          .eq("turnover_id", turnover.id)
      ]);

      if (itemsResult.error) throw itemsResult.error;
      if (countsResult.error) throw countsResult.error;

      inventoryItems = Array.isArray(itemsResult.data) ? itemsResult.data : [];
      inventoryCounts = Array.isArray(countsResult.data) ? countsResult.data : [];
    }

    function getInventoryCount(itemId) {
      return inventoryCounts.find(count => count.inventory_item_id === itemId) || null;
    }

    function getInventoryTarget(item) {
      return Math.max(Number(item.target_quantity) || 0, 0);
    }

    function getInventoryAmberLevel(item) {
      return Math.max(
        Number(item.amber_quantity) || 0,
        Number(item.minimum_quantity) || 0,
        0
      );
    }

    function getInventoryMinimum(item) {
      return Math.max(Number(item.minimum_quantity) || 0, 0);
    }

    function getInventoryQuantity(itemId) {
      const count = getInventoryCount(itemId);
      return Math.max(Number(count?.quantity_remaining) || 0, 0);
    }

    function getInventoryStatus(item, quantity, emergencyUsed = false) {
      const target = getInventoryTarget(item);
      const amberLevel = getInventoryAmberLevel(item);
      const minimum = getInventoryMinimum(item);

      if (emergencyUsed) {
        return {
          value: "emergency",
          levelStatus: "emergency_stock_used",
          stockStatus: "red",
          label: "Emergency Stock Used"
        };
      }

      if (quantity <= 0 || (minimum > 0 && quantity < minimum)) {
        return {
          value: "out",
          levelStatus: "out",
          stockStatus: "red",
          label: quantity <= 0
            ? "Out of Stock"
            : `Critical — below minimum ${minimum}`
        };
      }

      if (
        (amberLevel > 0 && quantity <= amberLevel) ||
        (target > 0 && quantity < target)
      ) {
        return {
          value: "low",
          levelStatus: "low",
          stockStatus: "amber",
          label: target > 0
            ? `Below Target — need ${Math.max(target - quantity, 0)}`
            : "Low Stock"
        };
      }

      return {
        value: "full",
        levelStatus: "full",
        stockStatus: "green",
        label: target > 0 ? "Target Met" : "Counted"
      };
    }

    function getInventoryProgress() {
      const completed = inventoryItems.filter(item => {
        const count = getInventoryCount(item.id);
        return count && count.quantity_remaining !== null && count.quantity_remaining !== undefined;
      }).length;

      return {
        completed,
        total: inventoryItems.length,
        percent: inventoryItems.length
          ? Math.round((completed / inventoryItems.length) * 100)
          : 100
      };
    }

    async function createInventoryNotifications(item, status, quantity) {
      if (!["low", "out", "emergency"].includes(status.value)) return;

      const { data: recipients, error: recipientsError } = await db
        .from("users")
        .select("id")
        .eq("company_id", turnover.company_id || currentProfile.company_id)
        .in("role", ["admin", "manager"])
        .eq("active", true);

      if (recipientsError) throw recipientsError;
      if (!recipients?.length) return;

      const severity = status.value === "low" ? "warning" : "critical";
      const statusLabel = status.value === "emergency"
        ? "Emergency stock used"
        : status.value === "out"
          ? "Out of stock"
          : "Below client target";

      const notificationRows = recipients.map(recipient => ({
        company_id: turnover.company_id || currentProfile.company_id,
        property_id: turnover.property_id,
        turnover_id: turnover.id,
        recipient_user_id: recipient.id,
        notification_type: "inventory_alert",
        severity,
        title: `${statusLabel}: ${item.item_name}`,
        message: `${item.item_name} count is ${quantity}. Client target is ${getInventoryTarget(item)}. Status: ${statusLabel}. Property: ${turnover.properties?.property_name || "Unknown property"}.`,
        action_url: `turnover-review.html?id=${encodeURIComponent(turnover.id)}`
      }));

      const { error } = await db
        .from("notifications")
        .insert(notificationRows);

      if (error) throw error;
    }

    async function saveInventoryCount(itemId, quantity, note, emergencyUsed, triggerElement) {
      const item = inventoryItems.find(record => record.id === itemId);
      if (!item) return;

      const safeQuantity = Math.max(Number(quantity) || 0, 0);
      const status = getInventoryStatus(item, safeQuantity, emergencyUsed);

      const inventoryElement = triggerElement?.closest("[data-inventory-item-id]");
      inventoryElement?.querySelectorAll("button, input, textarea").forEach(control => {
        control.disabled = true;
      });

      try {
        const existing = getInventoryCount(itemId);
        const previousStatus = existing
          ? getInventoryStatus(
              item,
              Number(existing.quantity_remaining) || 0,
              Boolean(existing.emergency_stock_used)
            ).value
          : null;

        const payload = {
          turnover_id: turnover.id,
          inventory_item_id: itemId,
          quantity_remaining: safeQuantity,
          level_status: status.levelStatus,
          stock_status: status.stockStatus,
          emergency_stock_used: emergencyUsed,
          cleaner_note: note || null,
          counted_by: currentProfile.id,
          counted_at: new Date().toISOString()
        };

        const { data, error } = await db
          .from("inventory_counts")
          .upsert(payload, {
            onConflict: "turnover_id,inventory_item_id"
          })
          .select(`
            id,
            turnover_id,
            inventory_item_id,
            quantity_remaining,
            level_status,
            stock_status,
            emergency_stock_used,
            cleaner_note,
            counted_by,
            counted_at
          `)
          .single();

        if (error) throw error;

        const index = inventoryCounts.findIndex(count => count.inventory_item_id === itemId);
        if (index >= 0) {
          inventoryCounts[index] = data;
        } else {
          inventoryCounts.push(data);
        }

        if (previousStatus !== status.value) {
          await createInventoryNotifications(item, status, safeQuantity);
        }

        renderPage();
        showToast(`${item.item_name} count saved: ${safeQuantity}.`);
      } catch (error) {
        inventoryElement?.querySelectorAll("button, input, textarea").forEach(control => {
          control.disabled = false;
        });

        showToast(error.message || "The inventory quantity could not be saved.", "error");
      }
    }

    function changeInventoryQuantity(itemId, change, button) {
      const itemElement = button.closest("[data-inventory-item-id]");
      const input = itemElement?.querySelector('[data-role="inventory-quantity"]');

      if (!input) return;

      const current = Math.max(Number(input.value) || 0, 0);
      input.value = Math.max(current + change, 0);

      saveInventoryFromElement(itemId, itemElement, button);
    }

    function saveInventoryFromElement(itemId, itemElement, triggerElement) {
      const quantity = Math.max(
        Number(itemElement?.querySelector('[data-role="inventory-quantity"]')?.value) || 0,
        0
      );

      const note =
        itemElement?.querySelector('[data-role="inventory-note"]')?.value.trim() || "";

      const emergencyUsed = Boolean(
        itemElement?.querySelector('[data-role="inventory-emergency"]')?.checked
      );

      saveInventoryCount(
        itemId,
        quantity,
        note,
        emergencyUsed,
        triggerElement
      );
    }

    async function loadPhotos() {
      const { data, error } = await db
        .from("photos")
        .select(`
          id,
          turnover_id,
          turnover_task_id,
          room_id,
          photo_type,
          storage_path,
          file_name,
          mime_type,
          file_size_bytes,
          caption,
          uploaded_by,
          taken_at,
          created_at
        `)
        .eq("turnover_id", turnover.id)
        .order("created_at", { ascending: true });

      if (error) throw error;

      taskPhotos = Array.isArray(data) ? data : [];

      await Promise.all(taskPhotos.map(async photo => {
        const { data: signedData, error: signedError } = await db.storage
          .from("turnover-photos")
          .createSignedUrl(photo.storage_path, 3600);

        photo.preview_url = signedError ? null : signedData?.signedUrl || null;
      }));
    }

    function getPhotosForTask(taskId) {
      return taskPhotos.filter(photo => photo.turnover_task_id === taskId);
    }

    function getRequiredPhotoCount(task) {
      const configured = Number(task.required_photo_count) || 0;
      return Math.max(configured, task.photo_required ? 1 : 0);
    }

    function getTaskProgress() {
      const sourceTasks = displayedTasks.length ? displayedTasks : tasks;

      const completed = sourceTasks.filter(task =>
        ["completed", "not_applicable"].includes(task.task_status)
      ).length;

      return {
        completed,
        total: sourceTasks.length,
        percent: sourceTasks.length
          ? Math.round((completed / sourceTasks.length) * 100)
          : 0
      };
    }

    function normalizeGroupName(value) {
      return String(value || "General Tasks")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");
    }

    function buildRoomGroups() {
      const grouped = new Map();

      tasks.forEach(task => {
        const physicalRoom = getPhysicalRoom(task);

        /*
         * Group by the original template room.
         * This preserves Bedroom 1, Bedroom 2, Bedroom 3,
         * Main Bathroom, Lower Bathroom, Front Exterior, etc.
         */
        const key = String(
          physicalRoom.roomId ||
          task.template_item_id ||
          `${normalizeGroupName(physicalRoom.roomName)}-${physicalRoom.roomCode || "general"}`
        );

        if (!grouped.has(key)) {
          grouped.set(key, {
            key,
            roomName: physicalRoom.roomName,
            roomCode: physicalRoom.roomCode,
            roomSortOrder: physicalRoom.roomSortOrder,
            items: []
          });
        }

        grouped.get(key).items.push(task);
      });

      roomGroups = Array.from(grouped.values())
        .map(group => {
          const seenTasks = new Set();

          const uniqueItems = group.items.filter(task => {
            const duplicateKey = [
              normalizeGroupName(task.section_name),
              String(task.task_text || "")
                .trim()
                .toLowerCase()
                .replace(/\s+/g, " ")
            ].join("::");

            if (seenTasks.has(duplicateKey)) return false;
            seenTasks.add(duplicateKey);
            return true;
          });

          uniqueItems.sort((a, b) => {
            const sortDifference =
              (Number(a.sort_order) || 0) - (Number(b.sort_order) || 0);

            if (sortDifference !== 0) return sortDifference;

            return String(a.task_text || "")
              .localeCompare(String(b.task_text || ""));
          });

          return {
            ...group,
            items: uniqueItems
          };
        })
        .sort((a, b) => {
          const sortDifference =
            (Number(a.roomSortOrder) || 0) -
            (Number(b.roomSortOrder) || 0);

          if (sortDifference !== 0) return sortDifference;

          return String(a.roomName || "")
            .localeCompare(String(b.roomName || ""), undefined, {
              numeric: true,
              sensitivity: "base"
            });
        });

      roomGroups.push({
        key: "__inventory__",
        roomName: "Inventory",
        roomCode: "INVENTORY",
        roomSortOrder: 99999,
        items: [],
        isInventory: true
      });

      displayedTasks = roomGroups
        .filter(group => !group.isInventory)
        .flatMap(group => group.items);

      if (!roomsInitialized && roomGroups.length) {
        const firstIncomplete = roomGroups.find(group =>
          getIncompleteTasks(group).length
        );

        openRoomKeys.add((firstIncomplete || roomGroups[0]).key);
        roomsInitialized = true;
      }
    }

    function getRoomProgress(group) {
      if (group.isInventory) return getInventoryProgress();

      const completed = group.items.filter(task =>
        ["completed", "not_applicable"].includes(task.task_status)
      ).length;

      return {
        completed,
        total: group.items.length,
        percent: group.items.length
          ? Math.round((completed / group.items.length) * 100)
          : 0
      };
    }

    function getIncompleteTasks(group) {
      if (group.isInventory) {
        return inventoryItems
          .filter(item => {
            const count = getInventoryCount(item.id);
            return !count || count.quantity_remaining === null || count.quantity_remaining === undefined;
          })
          .map(item => ({
            id: `inventory-${item.id}`,
            inventoryItemId: item.id,
            task_text: item.item_name,
            isInventory: true
          }));
      }

      return group.items.filter(task =>
        !["completed", "not_applicable"].includes(task.task_status)
      );
    }

    function getMissingPhotoCount(task) {
      if (task.isInventory) return 0;

      return Math.max(
        getRequiredPhotoCount(task) - getPhotosForTask(task.id).length,
        0
      );
    }

    function renderRemainingPanel() {
      const groupsWithRemaining = roomGroups
        .map(group => ({
          ...group,
          remaining: getIncompleteTasks(group)
        }))
        .filter(group => group.remaining.length);

      if (!groupsWithRemaining.length) {
        return `
          <section class="remaining-panel visible" id="remainingPanel">
            <div class="remaining-panel-header">
              <h2 class="remaining-panel-title">Remaining Tasks</h2>
            </div>
            <div class="room-empty">All checklist tasks are complete.</div>
          </section>
        `;
      }

      return `
        <section class="remaining-panel visible" id="remainingPanel">
          <div class="remaining-panel-header">
            <h2 class="remaining-panel-title">Remaining Tasks</h2>
            <strong>${groupsWithRemaining.reduce((sum, group) => sum + group.remaining.length, 0)} remaining</strong>
          </div>

          <div class="remaining-list">
            ${groupsWithRemaining.map(group => `
              <div class="remaining-room">
                <div class="remaining-room-title">${escapeHtml(group.roomName)}</div>

                ${group.remaining.map(task => {
                  const missingPhotos = getMissingPhotoCount(task);

                  return `
                    <button
                      class="remaining-item"
                      type="button"
                      data-open-room="${escapeHtml(group.key)}"
                      data-focus-task="${escapeHtml(task.id)}"
                      ${task.inventoryItemId ? `data-focus-inventory="${escapeHtml(task.inventoryItemId)}"` : ""}
                    >
                      <span class="remaining-box"></span>
                      <span>

    function toRadians(value) {
      return value * Math.PI / 180;
    }

    function calculateDistanceMetres(lat1, lon1, lat2, lon2) {
      const earthRadiusMetres = 6371000;
      const dLat = toRadians(lat2 - lat1);
      const dLon = toRadians(lon2 - lon1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRadians(lat1)) *
        Math.cos(toRadians(lat2)) *
        Math.sin(dLon / 2) *
        Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return earthRadiusMetres * c;
    }

    function formatDistance(value) {
      const metres = Number(value);
      if (!Number.isFinite(metres)) return "Not recorded";
      if (metres < 1000) return `${Math.round(metres)} m`;
      return `${(metres / 1000).toFixed(2)} km`;
    }

    function formatDuration(startValue, endValue) {
      if (!startValue || !endValue) return "Not available";

      const milliseconds =
        new Date(endValue).getTime() -
        new Date(startValue).getTime();

      if (!Number.isFinite(milliseconds) || milliseconds < 0) {
        return "Not available";
      }

      const totalMinutes = Math.round(milliseconds / 60000);
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;

      if (!hours) return `${minutes} min`;
      return `${hours} hr ${minutes} min`;
    }

    function getGpsPosition() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("This device does not support GPS location."));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          position => resolve(position),
          error => {
            const messages = {
              1: "Location permission was denied. Allow location access and try again.",
              2: "Your location could not be determined. Move to an open area and try again.",
              3: "The location request timed out. Try again."
            };

            reject(new Error(messages[error.code] || "GPS location could not be captured."));
          },
          {
            enableHighAccuracy: true,
            timeout: 20000,
            maximumAge: 0
          }
        );
      });
    }

    function getPropertyCoordinates() {
      const latitude = Number(turnover.properties?.latitude);
      const longitude = Number(turnover.properties?.longitude);

      if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) {
        return null;
      }

      return { latitude, longitude };
    }

    async function saveGpsEvent(type, button) {
      const isClockIn = type === "in";
      const propertyCoordinates = getPropertyCoordinates();

      button.disabled = true;
      button.textContent = isClockIn ? "Capturing GPS" : "Capturing GPS";

      try {
        const position = await getGpsPosition();

        const latitude = position.coords.latitude;
        const longitude = position.coords.longitude;
        const accuracy = position.coords.accuracy;
        const timestamp = new Date().toISOString();

        const distance = propertyCoordinates
          ? calculateDistanceMetres(
              latitude,
              longitude,
              propertyCoordinates.latitude,
              propertyCoordinates.longitude
            )
          : null;

        const payload = isClockIn
          ? {
              check_in_time: timestamp,
              check_in_latitude: latitude,
              check_in_longitude: longitude,
              check_in_accuracy: accuracy,
              check_in_distance: distance,
              status: turnover.status === "assigned" || turnover.status === "accepted"
                ? "in_progress"
                : turnover.status
            }
          : {
              check_out_time: timestamp,
              check_out_latitude: latitude,
              check_out_longitude: longitude,
              check_out_accuracy: accuracy,
              check_out_distance: distance
            };

        const { data, error } = await db
          .from("turnovers")
          .update(payload)
          .eq("id", turnover.id)
          .select(`
            check_in_time,
            check_out_time,
            check_in_latitude,
            check_in_longitude,
            check_in_accuracy,
            check_in_distance,
            check_out_latitude,
            check_out_longitude,
            check_out_accuracy,
            check_out_distance,
            status
          `)
          .single();

        if (error) throw error;

        Object.assign(turnover, data);
        renderPage();

        showToast(
          isClockIn
            ? "Clock in recorded successfully."
            : "Clock out recorded successfully."
        );
      } catch (error) {
        button.disabled = false;
        button.textContent = isClockIn ? "Clock In" : "Clock Out";
        showToast(error.message || "GPS could not be recorded.", "error");
      }
    }

        remainingOnly = !remainingOnly;

        if (remainingOnly) {
          const hasOpenRemainingRoom = roomGroups.some(group =>
            openRoomKeys.has(group.key) && getIncompleteTasks(group).length
          );

          if (!hasOpenRemainingRoom) {
            const firstRemaining = roomGroups.find(group => getIncompleteTasks(group).length);
            openRoomKeys.clear();

              openRoomKeys.add(firstRemaining.key);

          if (openRoomKeys.has(roomKey)) {
            openRoomKeys.delete(roomKey);
          } else {
            openRoomKeys.add(roomKey);
          }

          renderPage();
        });
      });

      document.getElementById("openAllRoomsButton")?.addEventListener("click", () => {
        openRoomKeys = new Set(roomGroups.map(group => group.key));

    function getFileExtension(file) {
      const mimeExtensions = {
        "image/jpeg": "jpg",
        "image/png": "png",
        "image/webp": "webp"
      };

      return mimeExtensions[file.type] || "jpg";
    }

    async function uploadTaskPhoto(taskId, input) {
      const task = tasks.find(item => item.id === taskId);
      const file = input.files?.[0];

      if (!task || !file) return;

      const allowedTypes = ["image/jpeg", "image/png", "image/webp"];
      const maxSize = 25 * 1024 * 1024;

      if (!allowedTypes.includes(file.type)) {
        input.value = "";
        showToast("Upload a JPEG, PNG, or WebP image.", "error");
        return;
      }

      if (file.size > maxSize) {
        input.value = "";
        showToast("The selected photo is larger than 25 MB.", "error");
        return;
      }

      const taskElement = input.closest("[data-task-id]");
      const uploadLabel = taskElement?.querySelector(`label[for="${input.id}"]`);
      const previousLabel = uploadLabel?.textContent || "Upload Task Photo";

      input.disabled = true;
      if (uploadLabel) uploadLabel.textContent = "Uploading Photo";

      const extension = getFileExtension(file);
      const uniqueName = `${crypto.randomUUID()}.${extension}`;
      const storagePath = `${currentProfile.id}/${turnover.id}/${taskId}/${uniqueName}`;

      try {
        const { error: storageError } = await db.storage
          .from("turnover-photos")
          .upload(storagePath, file, {
            cacheControl: "3600",
            contentType: file.type,
            upsert: false
          });

        if (storageError) throw storageError;

        const { data: photoRecord, error: databaseError } = await db
          .from("photos")
          .insert({
            turnover_id: turnover.id,
            turnover_task_id: taskId,
            room_id: task.room_id || null,
            photo_type: "after",
            storage_path: storagePath,
            file_name: file.name,
            mime_type: file.type,
            file_size_bytes: file.size,
            uploaded_by: currentProfile.id,
            taken_at: new Date().toISOString()
          })
          .select(`
            id,
            turnover_id,
            turnover_task_id,
            room_id,
            photo_type,
            storage_path,
            file_name,
            mime_type,
            file_size_bytes,
            caption,
            uploaded_by,
            taken_at,
            created_at
          `)
          .single();

        if (databaseError) {
          await db.storage.from("turnover-photos").remove([storagePath]);
          throw databaseError;
        }

        const { data: signedData } = await db.storage
          .from("turnover-photos")
          .createSignedUrl(storagePath, 3600);

        photoRecord.preview_url = signedData?.signedUrl || null;
        taskPhotos.push(photoRecord);

        renderPage();
        showToast("The task photo has been uploaded successfully.");
      } catch (error) {
        input.disabled = false;
        input.value = "";
        if (uploadLabel) uploadLabel.textContent = previousLabel;
        showToast(error.message || "The photo could not be uploaded.", "error");
      }
    }

    async function saveTaskNote(taskId, taskElement, button) {
      const note = taskElement.querySelector('[data-role="note"]').value.trim();

      button.disabled = true;
      button.textContent = "Saving Note";

      try {
        const { error } = await db
          .from("turnover_tasks")
          .update({
            cleaner_note: note || null,
            updated_at: new Date().toISOString()
          })
          .eq("id", taskId)
          .eq("turnover_id", turnover.id);

        if (error) throw error;

        const task = tasks.find(item => item.id === taskId);
        if (task) task.cleaner_note = note || null;

        showToast("The task note has been saved.");
      } catch (error) {
        showToast(error.message || "The note could not be saved.", "error");
      } finally {
        button.disabled = false;
        button.textContent = "Save Note";
      }
    }

    async function completeTask(taskId, taskElement, button) {
      const task = tasks.find(item => item.id === taskId);
      if (!task) return;

      const note = taskElement.querySelector('[data-role="note"]').value.trim();

      if (task.notes_required && !note) {
        showToast("A cleaner note is required before this task can be completed.", "error");
        return;
      }

      const requiredPhotoCount = getRequiredPhotoCount(task);
      const uploadedPhotoCount = getPhotosForTask(task.id).length;

      if (uploadedPhotoCount < requiredPhotoCount) {
        const remaining = requiredPhotoCount - uploadedPhotoCount;
        showToast(`${remaining} required photo${remaining === 1 ? " remains" : "s remain"} before this task can be completed.`, "error");
        return;
      }

      button.disabled = true;
      button.textContent = "Saving";

      try {
        const { error } = await db
          .from("turnover_tasks")
          .update({
            task_status: "completed",
            cleaner_note: note || null,
            completed_by: currentProfile.id,
            completed_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          })
          .eq("id", taskId)
          .eq("turnover_id", turnover.id);

        if (error) throw error;

        task.task_status = "completed";
        task.cleaner_note = note || null;

        renderPage();
        showToast("The task has been marked complete.");
      } catch (error) {
        button.disabled = false;
        button.textContent = "Mark Complete";
        showToast(error.message || "The task could not be completed.", "error");
      }
    }

    async function markNotApplicable(taskId, button) {
      const task = tasks.find(item => item.id === taskId);
      if (!task || task.is_required) return;

      button.disabled = true;
      button.textContent = "Saving";

      try {
        const { error } = await db
          .from("turnover_tasks")
          .update({
            task_status: "not_applicable",
            completed_by: currentProfile.id,
            completed_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          })
          .eq("id", taskId)
          .eq("turnover_id", turnover.id);

        if (error) throw error;

        task.task_status = "not_applicable";
        renderPage();
        showToast("The task has been marked not applicable.");
      } catch (error) {
        button.disabled = false;
        button.textContent = "Not Applicable";
        showToast(error.message || "The task could not be updated.", "error");
      }
    }

    async function submitTurnover() {
      const validationTasks = displayedTasks.length ? displayedTasks : tasks;

      const incompleteRequired = validationTasks.filter(task =>
        task.is_required && !["completed", "not_applicable"].includes(task.task_status)
      );

      const missingRequiredPhotos = validationTasks.filter(task =>
        getPhotosForTask(task.id).length < getRequiredPhotoCount(task)
      );

      const incompleteInventory = inventoryItems.filter(item => {
        const count = getInventoryCount(item.id);
        return !count || count.quantity_remaining === null || count.quantity_remaining === undefined;
      });

      const missingClockIn = !turnover.check_in_time;
      const missingClockOut = !turnover.check_out_time;

      if (
        incompleteRequired.length ||
        missingRequiredPhotos.length ||
        incompleteInventory.length ||
        missingClockIn ||
        missingClockOut
      ) {
        const missingTaskNames = incompleteRequired
          .slice(0, 3)
          .map(task => task.task_text);

        const missingPhotoNames = missingRequiredPhotos
          .filter(task => !incompleteRequired.some(item => item.id === task.id))
          .slice(0, 3)
          .map(task => `${task.task_text} photo`);

        const missingInventoryNames = incompleteInventory
          .slice(0, 3)
          .map(item => `${item.item_name} quantity`);

        const missingGpsNames = [
          ...(missingClockIn ? ["GPS clock in"] : []),
          ...(missingClockOut ? ["GPS clock out"] : [])
        ];

        const remainingNames = [
          ...missingTaskNames,
          ...missingPhotoNames,
          ...missingInventoryNames,
          ...missingGpsNames
        ].slice(0, 4);

        const totalRemaining =
          incompleteRequired.length +
          missingRequiredPhotos.length +
          incompleteInventory.length +
          (missingClockIn ? 1 : 0) +
          (missingClockOut ? 1 : 0);

        remainingOnly = true;

        const firstMissing = incompleteRequired[0] || missingRequiredPhotos[0];

        if (firstMissing) {
          const firstGroup = roomGroups.find(group =>
            !group.isInventory && group.items.some(task => task.id === firstMissing.id)
          );

          if (firstGroup) {
            openRoomKeys.add(firstGroup.key);
          }
        } else if (incompleteInventory.length) {
          openRoomKeys.add("__inventory__");
        }

        renderPage();

        showToast(
          `Cannot submit. ${totalRemaining} requirement${totalRemaining === 1 ? "" : "s"} remain: ${remainingNames.join(", ")}${totalRemaining > remainingNames.length ? "…" : ""}`,
          "error"
        );
        return;
      }

      const button = document.getElementById("submitTurnoverButton");
      button.disabled = true;
      button.textContent = "Submitting";

      try {
        const { error } = await db
          .from("turnovers")
          .update({
            status: "review_required",
            property_readiness_status: "needs_review"
          })
          .eq("id", turnover.id);

        if (error) throw error;

        turnover.status = "review_required";
        renderPage();
        showToast("The turnover has been submitted for manager review.");
      } catch (error) {
        button.disabled = false;
        button.textContent = "Submit for Review";
        showToast(error.message || "The turnover could not be submitted.", "error");
      }
    }

    document.getElementById("backButton").addEventListener("click", () => {
      window.location.href = "cleaner-dashboard.html";
    });

    document.getElementById("logoutButton").addEventListener("click", async () => {
      try {
        await db.auth.signOut();
      } finally {
        window.location.href = "login.html";
      }
    });

    async function initialize() {
      try {
        const authenticated = await requireSession();
        if (!authenticated) return;

        await loadTurnover();
        await loadTasks();
        await Promise.all([
          loadTemplateRoomNames(),
          loadInventory(),
          loadPhotos()
        ]);
        renderPage();
      } catch (error) {
        console.error("Cleaner turnover page failed:", error);

        pageContent.innerHTML = `
          <div class="error">
            <h1 class="state-title">Unable to load turnover checklist</h1>
            <p class="state-text">${escapeHtml(error.message || "An unexpected error occurred.")}</p>
          </div>
        `;
      }
    }

    initialize();
  </script>
</body>
</html>
